<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DYNAN MARKET | Premium Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #F4E883;
            --accent-dark: #D4A017;
            --accent-glow: rgba(244, 232, 131, 0.25);
            --gold-gradient: linear-gradient(135deg, #F4E883, #D4A017);
        }

        body.dark {
            --bg-primary: #0A0A08;
            --bg-secondary: #141412;
            --bg-card: rgba(20, 20, 18, 0.96);
            --text-primary: #FFFFFF;
            --text-secondary: #D0D0C0;
            --border: rgba(244, 232, 131, 0.2);
            --glass-bg: rgba(20, 20, 18, 0.92);
            --glass-border: rgba(244, 232, 131, 0.25);
            --shadow: 0 12px 48px rgba(0,0,0,0.5);
            --input-bg: #2A2A20;
            --toast-bg: #1A1A14;
            --sidebar-bg: #0D0D09;
            --card-hover: rgba(244, 232, 131, 0.05);
        }

        body.light {
            --bg-primary: #F8F8F5;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255,255,255,0.98);
            --text-primary: #0D0D09;
            --text-secondary: #4A4A3A;
            --border: rgba(212, 160, 23, 0.2);
            --glass-bg: rgba(255,255,255,0.95);
            --glass-border: rgba(212, 160, 23, 0.3);
            --shadow: 0 12px 48px rgba(0,0,0,0.08);
            --input-bg: #FFFFFF;
            --toast-bg: #FFFFFF;
            --sidebar-bg: #F8F8F5;
            --card-hover: rgba(212, 160, 23, 0.05);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
            font-size: 16px;
            line-height: 1.6;
        }

        h1, h2, h3, .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: 1px;
        }

        h2 { font-size: 2.2rem; margin-bottom: 1.5rem; }
        h3 { font-size: 1.6rem; margin-bottom: 1rem; }
        h4 { font-size: 1.2rem; margin-bottom: 0.5rem; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* ==================== GLASS & CARDS ==================== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }

        /* ==================== BUTTONS - DIPERBESAR ==================== */
        .btn-gold {
            background: var(--gold-gradient);
            border: none;
            color: #0D0D09;
            padding: 16px 36px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            width: auto;
            min-width: 200px;
        }
        .btn-gold:hover { transform: scale(1.03); box-shadow: 0 0 25px var(--accent-glow); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 160px;
        }
        .btn-outline:hover { background: var(--accent); color: #0D0D09; }

        .btn-danger {
            background: rgba(220, 53, 69, 0.9);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-danger:hover { background: rgba(220, 53, 69, 1); transform: scale(1.02); }

        .btn-small {
            background: var(--accent);
            border: none;
            color: #0D0D09;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-small:hover { transform: scale(1.03); }

        .qty-btn {
            background: var(--border);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        .qty-btn:hover { background: var(--accent); color: #0D0D09; transform: scale(1.05); }

        .btn-add-cart {
            background: var(--gold-gradient);
            border: none;
            color: #0D0D09;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-add-cart:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--accent-glow); }

        /* ==================== NAVBAR ==================== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--accent);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover { background: var(--accent-glow); }

        .logo { text-align: center; cursor: pointer; }
        .logo-text { font-size: 1.8rem; background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-sub { font-size: 0.65rem; color: var(--accent); letter-spacing: 4px; margin-top: 4px; }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            z-index: 1000;
            transition: left 0.3s ease;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h3 { font-size: 1.4rem; margin: 0; }
        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .sidebar-menu button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.05rem;
            padding: 0.9rem 1.2rem;
            text-align: left;
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.3s;
        }
        .sidebar-menu button i { width: 30px; font-size: 1.1rem; }
        .sidebar-menu button:hover, .sidebar-menu button.active {
            background: var(--accent);
            color: #0D0D09;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .overlay.show { display: block; }

        /* ==================== CONTAINER & PAGES ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5%;
            min-height: calc(100vh - 150px);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px);} to { opacity: 1; transform: translateY(0);} }

        /* ==================== AUTH PAGES ==================== */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .auth-card {
            max-width: 500px;
            width: 100%;
            padding: 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            box-shadow: var(--shadow);
        }
        .auth-header { text-align: center; margin-bottom: 1.8rem; }
        .auth-logo { font-size: 2.5rem; background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-subtitle { font-size: 0.8rem; color: var(--accent); letter-spacing: 3px; }
        .auth-title { font-size: 1.2rem; margin-top: 1rem; color: var(--text-secondary); }
        .auth-divider { width: 60px; height: 2px; background: var(--accent); margin: 0.8rem auto 0; }

        /* ==================== HERO ==================== */
        .hero {
            text-align: center;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border-radius: 28px;
        }
        .hero h2 { font-size: 2.2rem; margin-bottom: 0.8rem; }
        .hero p { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 1.2rem; }

        /* ==================== PRODUCTS GRID ==================== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .product-card { padding: 1.5rem; }
        .product-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
        .product-type-badge {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--accent);
            color: #0D0D09;
            display: inline-block;
            margin-bottom: 10px;
        }
        .product-price { font-size: 1.6rem; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .variant-select {
            width: 100%;
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 14px 0;
            justify-content: center;
        }
        .stock-badge { font-size: 0.7rem; padding: 4px 12px; border-radius: 20px; background: var(--border); display: inline-block; }

        /* ==================== STATS GRID ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1.2rem;
            margin-top: 1.2rem;
        }
        .stat-card { text-align: center; padding: 1.2rem; border-radius: 24px; }
        .stat-number { font-size: 2.2rem; font-weight: bold; color: var(--accent); font-family: 'Cormorant Garamond', serif; }

        /* ==================== FORMS ==================== */
        .form-group { margin-bottom: 1.2rem; }
        label { font-weight: 600; margin-bottom: 0.5rem; display: block; color: var(--accent); font-size: 0.85rem; }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        .password-wrapper { position: relative; width: 100%; }
        .password-wrapper input { padding-right: 50px; }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--accent);
            background: none;
            border: none;
            font-size: 1.2rem;
        }

        .variant-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }
        .variant-item input { flex: 1; margin: 0; }

        /* ==================== CART & ORDERS ==================== */
        .cart-item {
            padding: 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .cart-item-details { flex: 2; }
        .cart-item-price { font-weight: bold; color: var(--accent); font-size: 1.1rem; }
        .cart-item-qty { display: flex; align-items: center; gap: 10px; }

        /* ==================== MODAL ==================== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            max-width: 420px;
            width: 90%;
            padding: 2rem;
            text-align: center;
            border-radius: 32px;
        }
        .modal-content img { max-width: 220px; margin: 1rem auto; border-radius: 20px; }
        .modal-content .btn-gold { width: 100%; }

        /* ==================== TOAST & FOOTER ==================== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--toast-bg);
            border-left: 5px solid var(--accent);
            padding: 1rem 2rem;
            border-radius: 18px;
            box-shadow: var(--shadow);
            z-index: 1500;
            animation: slideIn 0.3s ease;
            font-size: 0.95rem;
            font-weight: 500;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            margin-top: 2.5rem;
            font-size: 0.85rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--glass-bg);
            border-radius: 28px;
            border: 1px dashed var(--accent);
        }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; }

        .badge-owner { background: var(--accent); color: #0D0D09; padding: 3px 10px; border-radius: 14px; font-size: 0.7rem; }

        @media (max-width: 768px) {
            body { font-size: 15px; }
            .container { padding: 1rem; }
            .hero h2 { font-size: 1.6rem; }
            .products-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .btn-gold, .btn-outline { padding: 12px 24px; font-size: 0.9rem; min-width: auto; width: 100%; }
        }
    </style>
</head>
<body class="dark">
    <div id="app"></div>

<script>
    // ==================== KONFIGURASI ====================
    const OWNER_USERNAME = "dynan";
    const OWNER_PASSWORD = "257368419";
    const WHATSAPP_NUMBER = "6283837266823"; // ✅ UPDATED
    const MAPS_LINK = "https://maps.app.goo.gl/fr1AMLqnS6DnV1m69";
    const QRIS_LINK = "https://freeimage.host/i/C9S8XI9";

    // ==================== DATA STORAGE (PENYIMPANAN PERMANEN) ====================
    // Semua data tersimpan di localStorage dengan key masing-masing
    // Data TIDAK AKAN HILANG meskipun browser direfresh atau ditutup
    
    let products = JSON.parse(localStorage.getItem("products_json")) || [];
    let users = JSON.parse(localStorage.getItem("users_json")) || [{ 
        username: OWNER_USERNAME, 
        password: OWNER_PASSWORD, 
        role: "owner", 
        email: "owner@dynan.com",
        createdAt: new Date().toISOString()
    }];
    let carts = JSON.parse(localStorage.getItem("carts_json")) || {};
    let orders = JSON.parse(localStorage.getItem("orders_json")) || [];
    let ratings = JSON.parse(localStorage.getItem("ratings_json")) || [];
    let comments = JSON.parse(localStorage.getItem("comments_json")) || [];
    let totalVisits = parseInt(localStorage.getItem("totalVisits_json")) || 0;
    
    // Unique visitor counter (1 per browser)
    if (!localStorage.getItem("visitor_id")) {
        localStorage.setItem("visitor_id", Date.now() + '_' + Math.random().toString(36).substr(2, 6));
        totalVisits++;
        localStorage.setItem("totalVisits_json", totalVisits);
    }

    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    let currentPage = "home";

    // ==================== SAVE ALL DATA ====================
    function saveAll() {
        localStorage.setItem("products_json", JSON.stringify(products));
        localStorage.setItem("users_json", JSON.stringify(users));
        localStorage.setItem("carts_json", JSON.stringify(carts));
        localStorage.setItem("orders_json", JSON.stringify(orders));
        localStorage.setItem("ratings_json", JSON.stringify(ratings));
        localStorage.setItem("comments_json", JSON.stringify(comments));
        localStorage.setItem("totalVisits_json", totalVisits);
    }

    function showToast(msg, isError = false) {
        let toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        if (isError) toast.style.borderLeftColor = "#dc3545";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }

    function toggleTheme() {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
    }

    function togglePassword(inputId, iconId) {
        let input = document.getElementById(inputId);
        let icon = document.getElementById(iconId);
        if (input && icon) {
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    }

    // ==================== AUTH FUNCTIONS ====================
    function handleLogin() {
        let username = document.getElementById("loginUsername")?.value.trim();
        let password = document.getElementById("loginPassword")?.value;
        if (!username || !password) { showToast("Username dan password harus diisi!", true); return; }
        let user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = user;
            localStorage.setItem("currentUser", JSON.stringify(user));
            showToast(`✅ Selamat datang, ${username}!`);
            renderApp();
        } else {
            showToast("❌ Login gagal! Username atau password salah.", true);
        }
    }

    function handleRegister() {
        let username = document.getElementById("regUsername")?.value.trim();
        let password = document.getElementById("regPassword")?.value;
        let email = document.getElementById("regEmail")?.value.trim();
        if (!username || !password) { showToast("Username dan password harus diisi!", true); return; }
        if (username.length < 3) { showToast("Username minimal 3 karakter!", true); return; }
        if (password.length < 3) { showToast("Password minimal 3 karakter!", true); return; }
        if (username === OWNER_USERNAME) { showToast("Username tidak tersedia!", true); return; }
        if (users.find(u => u.username === username)) { showToast("Username sudah terdaftar!", true); return; }
        users.push({ username: username, password: password, email: email || "", role: "customer", createdAt: new Date().toISOString() });
        saveAll();
        showToast("✅ Registrasi berhasil! Silakan login.");
        showLoginForm();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem("currentUser");
        showToast("Anda telah logout.");
        renderApp();
    }

    // ==================== SIDEBAR & NAV ====================
    function closeSidebar() {
        document.getElementById("sidebar")?.classList.remove("open");
        document.getElementById("overlay")?.classList.remove("show");
    }

    function openSidebar() {
        document.getElementById("sidebar")?.classList.add("open");
        document.getElementById("overlay")?.classList.add("show");
    }

    function showPage(pageId) {
        currentPage = pageId;
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(`page-${pageId}`)?.classList.add("active");
        closeSidebar();
        if (pageId === "home") renderHome();
        if (pageId === "products") renderProducts();
        if (pageId === "cart") renderCart();
        if (pageId === "orders") renderOrders();
        if (pageId === "reviews") renderReviews();
        if (pageId === "account") renderAccount();
        if (pageId === "manage-products") renderManageProducts();
    }

    // ==================== CART FUNCTIONS ====================
    function getCartKey(productId, variantIndex = null) {
        return variantIndex !== null ? `${productId}_v${variantIndex}` : `${productId}`;
    }

    function addToCartSimple(productId) {
        if (!currentUser || currentUser.role !== "customer") {
            showToast("Silakan login sebagai pelanggan!", true);
            return;
        }
        let product = products.find(p => p.id == productId);
        if (!product) return;
        
        let cartKey = getCartKey(productId);
        if (!carts[currentUser.username]) carts[currentUser.username] = {};
        if (!carts[currentUser.username][cartKey]) {
            carts[currentUser.username][cartKey] = { 
                ...product, 
                quantity: 0, 
                variantName: null, 
                variantPrice: product.price, 
                productType: "simple",
                productId: product.id,
                name: product.name
            };
        }
        carts[currentUser.username][cartKey].quantity++;
        saveAll();
        showToast(`✅ ${product.name} ditambahkan ke keranjang! (${carts[currentUser.username][cartKey].quantity}x)`);
        renderCart();
    }

    function addToCartVariant(productId, variantIndex, variantName, variantPrice) {
        if (!currentUser || currentUser.role !== "customer") {
            showToast("Silakan login sebagai pelanggan!", true);
            return;
        }
        let product = products.find(p => p.id == productId);
        if (!product) return;
        
        let cartKey = getCartKey(productId, variantIndex);
        if (!carts[currentUser.username]) carts[currentUser.username] = {};
        if (!carts[currentUser.username][cartKey]) {
            carts[currentUser.username][cartKey] = { 
                productId: product.id,
                name: product.name,
                quantity: 0, 
                variantName: variantName, 
                variantPrice: variantPrice, 
                variantIndex: variantIndex,
                productType: "variant",
                price: variantPrice
            };
        }
        carts[currentUser.username][cartKey].quantity++;
        saveAll();
        showToast(`✅ ${product.name} - ${variantName} ditambahkan! (${carts[currentUser.username][cartKey].quantity}x)`);
        renderCart();
    }

    function updateCartQuantity(cartKey, delta) {
        if (!currentUser || !carts[currentUser.username]) return;
        let item = carts[currentUser.username][cartKey];
        if (item) {
            let newQty = item.quantity + delta;
            if (newQty <= 0) {
                delete carts[currentUser.username][cartKey];
            } else {
                item.quantity = newQty;
            }
            saveAll();
            renderCart();
        }
    }

    function removeFromCart(cartKey) {
        if (!currentUser || !carts[currentUser.username]) return;
        delete carts[currentUser.username][cartKey];
        saveAll();
        renderCart();
    }

    // ==================== RENDER PRODUCT CARD ====================
    function renderProductCard(p) {
        const isCustomer = currentUser?.role === "customer";
        const isOwner = currentUser?.role === "owner";
        
        if (p.productType === "simple") {
            return `
                <div class="card product-card">
                    <div class="product-name">${p.name}</div>
                    <div class="product-type-badge">📦 Produk Biasa</div>
                    <div style="font-size:0.85rem; margin:8px 0;">${p.benefits || ""}</div>
                    <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                    <div class="stock-badge">Stok: ${p.stock || 0}</div>
                    ${isCustomer ? `
                        <button class="btn-add-cart" onclick="addToCartSimple(${p.id})">
                            <i class="fas fa-cart-plus"></i> Tambah ke Keranjang
                        </button>
                    ` : (isOwner ? `
                        <div style="margin-top:12px; display:flex; gap:10px; justify-content:center;">
                            <button class="btn-small" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    ` : `<p style="margin-top:10px; font-size:0.8rem;">Login sebagai pelanggan untuk membeli</p>`)}
                </div>
            `;
        } else {
            if (!p.variants || p.variants.length === 0) return "";
            let variantsHtml = `<select class="variant-select" id="variant-${p.id}" onchange="updateVariantPriceDisplay(${p.id})">`;
            p.variants.forEach((v, idx) => {
                variantsHtml += `<option value="${idx}" data-price="${v.price}" data-name="${v.name}">${v.name} - Rp ${v.price.toLocaleString()}</option>`;
            });
            variantsHtml += `</select>`;
            variantsHtml += `<div class="product-price" id="price-${p.id}">Rp ${p.variants[0].price.toLocaleString()}</div>`;
            
            return `
                <div class="card product-card">
                    <div class="product-name">${p.name}</div>
                    <div class="product-type-badge">🎚️ Produk Varian</div>
                    <div style="font-size:0.85rem; margin:8px 0;">${p.benefits || ""}</div>
                    ${variantsHtml}
                    ${isCustomer ? `
                        <button class="btn-add-cart" onclick="addToCartVariantFromSelect(${p.id})">
                            <i class="fas fa-cart-plus"></i> Tambah ke Keranjang
                        </button>
                    ` : (isOwner ? `
                        <div style="margin-top:12px; display:flex; gap:10px; justify-content:center;">
                            <button class="btn-small" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    ` : `<p style="margin-top:10px; font-size:0.8rem;">Login sebagai pelanggan untuk membeli</p>`)}
                </div>
            `;
        }
    }

    function updateVariantPriceDisplay(productId) {
        let select = document.getElementById(`variant-${productId}`);
        let priceDiv = document.getElementById(`price-${productId}`);
        if (select && priceDiv) {
            let opt = select.options[select.selectedIndex];
            let price = opt.getAttribute("data-price");
            priceDiv.innerHTML = `Rp ${parseInt(price).toLocaleString()}`;
        }
    }

    function addToCartVariantFromSelect(productId) {
        let select = document.getElementById(`variant-${productId}`);
        if (!select) return;
        let variantIndex = parseInt(select.value);
        let opt = select.options[select.selectedIndex];
        let variantName = opt.getAttribute("data-name");
        let variantPrice = parseInt(opt.getAttribute("data-price"));
        addToCartVariant(productId, variantIndex, variantName, variantPrice);
    }

    // ==================== RENDER CART ====================
    function renderCart() {
        if (!currentUser || currentUser.role !== "customer") {
            document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i> Login sebagai pelanggan untuk melihat keranjang</div>`);
            document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = "");
            return;
        }
        
        let cart = carts[currentUser.username] || {};
        let cartKeys = Object.keys(cart);
        
        if (cartKeys.length === 0) {
            document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = `<div class="empty-state"><i class="fas fa-shopping-cart"></i> Keranjang belanja kosong</div>`);
            document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = "");
            return;
        }
        
        let itemsHtml = "";
        let total = 0;
        
        for (let key of cartKeys) {
            let item = cart[key];
            let itemTotal = (item.variantPrice || item.price) * item.quantity;
            total += itemTotal;
            let displayName = item.variantName ? `${item.name} (${item.variantName})` : item.name;
            itemsHtml += `
                <div class="cart-item">
                    <div class="cart-item-details">
                        <div><b>${displayName}</b></div>
                        <div class="cart-item-price">Rp ${(item.variantPrice || item.price).toLocaleString()}</div>
                    </div>
                    <div class="cart-item-qty">
                        <button class="qty-btn" onclick="updateCartQuantity('${key}', -1)">−</button>
                        <span style="min-width: 40px; text-align: center; font-weight: bold;">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateCartQuantity('${key}', 1)">+</button>
                        <button class="btn-danger" style="margin-left: 8px;" onclick="removeFromCart('${key}')"><i class="fas fa-trash"></i></button>
                    </div>
                    <div style="min-width: 120px; text-align: right; font-weight: bold;">Rp ${itemTotal.toLocaleString()}</div>
                </div>
            `;
        }
        
        itemsHtml += `<div class="cart-item" style="font-weight: bold; border-top: 2px solid var(--accent); margin-top: 8px; font-size: 1.2rem;">
            <div>Total</div>
            <div></div>
            <div>Rp ${total.toLocaleString()}</div>
        </div>`;
        
        document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = itemsHtml);
        document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = `<button class="btn-gold" onclick="showPaymentModal(${total})"><i class="fas fa-credit-card"></i> Checkout & Bayar Sekarang</button>`);
    }

    // ==================== CHECKOUT & PAYMENT ====================
    function showPaymentModal(total) {
        let cart = carts[currentUser.username] || {};
        let cartKeys = Object.keys(cart);
        if (cartKeys.length === 0) return;
        
        let items = [];
        for (let key of cartKeys) {
            let item = cart[key];
            let displayName = item.variantName ? `${item.name} (${item.variantName})` : item.name;
            items.push(`${displayName} x${item.quantity} = Rp ${((item.variantPrice || item.price) * item.quantity).toLocaleString()}`);
        }
        let itemsText = items.join("\n");
        
        let modalHtml = `
            <div class="modal" id="paymentModal">
                <div class="modal-content glass">
                    <h3>💳 QRIS Payment</h3>
                    <img src="${QRIS_LINK}" alt="QRIS Code">
                    <p><strong>Total: Rp ${total.toLocaleString()}</strong></p>
                    <p style="font-size: 0.85rem;">Scan QRIS di atas untuk melakukan pembayaran</p>
                    <button class="btn-gold" onclick="confirmPaymentAndWA(${total}, \`${itemsText.replace(/`/g, '\\`')}\`)"><i class="fab fa-whatsapp"></i> Konfirmasi via WhatsApp</button>
                    <button class="btn-outline" onclick="closeModal()">Tutup</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML("beforeend", modalHtml);
    }

    function closeModal() { document.getElementById("paymentModal")?.remove(); }

    function confirmPaymentAndWA(total, itemsText) {
        let cart = carts[currentUser.username] || {};
        let cartKeys = Object.keys(cart);
        if (cartKeys.length === 0) return;
        
        let orderId = Date.now();
        let orderItems = [];
        for (let key of cartKeys) {
            let item = cart[key];
            orderItems.push({
                productName: item.name,
                variantName: item.variantName || null,
                price: item.variantPrice || item.price,
                quantity: item.quantity
            });
        }
        
        orders.push({
            id: orderId,
            username: currentUser.username,
            items: orderItems,
            total: total,
            status: "Menunggu Konfirmasi",
            date: new Date().toLocaleString('id-ID')
        });
        
        carts[currentUser.username] = {};
        saveAll();
        
        let waMsg = `*KONFIRMASI PEMBAYARAN DYNAN MARKET*\n\nHalo Admin, saya sudah melakukan pembayaran.\n\nDetail Pesanan:\n${itemsText}\n\nTotal: Rp ${total.toLocaleString()}\nTanggal: ${new Date().toLocaleString('id-ID')}\nPelanggan: ${currentUser.username}\n\n*Bukti transfer terlampir.*\n\nMohon segera diproses.`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waMsg)}`, '_blank');
        
        showToast("Pesanan dibuat! Silakan kirim bukti transfer via WhatsApp.");
        closeModal();
        renderCart();
        renderOrders();
        showPage("orders");
    }

    function confirmOrder(orderId) {
        let order = orders.find(o => o.id == orderId);

    // ==================== REVIEWS ====================
    function submitReview() {
        if (!currentUser || currentUser.role !== "customer") { showToast("Login sebagai pelanggan!", true); return; }
        let stars = parseInt(document.getElementById("ratingStars")?.value || 5);
        let text = document.getElementById("commentText")?.value.trim();

    function getStats() {
        let totalSold = 0, totalRevenue = 0;

        return { totalSold, totalRevenue, totalProducts: products.length, totalCustomers: users.filter(u => u.role === "customer").length, totalVisits };
    }

    function editProfile() {
        let newU = document.getElementById("editUsername")?.value.trim();
        let newP = document.getElementById("editPassword")?.value;
        let newE = document.getElementById("editEmail")?.value.trim();
        if (newU && newU !== OWNER_USERNAME && !users.find(u => u.username === newU && u.username !== currentUser.username)) {
            let old = currentUser.username;
            currentUser.username = newU;
            let idx = users.findIndex(u => u.username === old);
            if (idx !== -1) users[idx] = currentUser;
            if (carts[old]) { carts[newU] = carts[old]; delete carts[old]; }
            orders.forEach(o => { if (o.username === old) o.username = newU; });
        }
        if (newP) currentUser.password = newP;
        if (newE) currentUser.email = newE;
        let idx = users.findIndex(u => u.username === currentUser.username);
        if (idx !== -1) users[idx] = currentUser;
        saveAll();
        localStorage.setItem("currentUser", JSON.stringify(currentUser));
        showToast("✅ Profil berhasil diperbarui!");
        renderAccount();
    }

        let productType = document.getElementById("productTypeSelect")?.value;

            let price = parseInt(document.getElementById("simplePrice")?.value);
            let stock = parseInt(document.getElementById("simpleStock")?.value) || 0;
            if (!price || price <= 0) { showToast("Harga produk wajib diisi!", true); return; }
            products.push({
                id, name, type: type || "Produk", benefits: benefits || "",
                productType: "simple", price: price, stock: stock
            });
            showToast("✅ Produk biasa berhasil ditambahkan!");

                id, name, type: type || "Produk", benefits: benefits || "",
                productType: "variant", variants: variants
            });
            showToast("✅ Produk varian berhasil ditambahkan!");
        }

        document.getElementById("prodName").value = "";
        document.getElementById("prodType").value = "";
        document.getElementById("prodBenefits").value = "";
        document.getElementById("variantsContainer").innerHTML = "";

        document.getElementById("simpleStock").value = "";

        renderProducts();
        renderHome();

            }
        }).join("");
        document.getElementById("manageProductsList") && (document.getElementById("manageProductsList").innerHTML = list);
    }

    function editProduct(id) {
        let product = products.find(p => p.id === id);
        if (product) {
            document.getElementById("prodName").value = product.name;
            document.getElementById("prodType").value = product.type || "";
            document.getElementById("prodBenefits").value = product.benefits || "";
            document.getElementById("productTypeSelect").value = product.productType;
            toggleProductType();
            
            if (product.productType === "simple") {
                document.getElementById("simplePrice").value = product.price;
                document.getElementById("simpleStock").value = product.stock;
            } else {
                let container = document.getElementById("variantsContainer");
                container.innerHTML = "";
                product.variants.forEach(v => {
                    let idx = Date.now();
                    let div = document.createElement("div");
                    div.className = "variant-item";
                    div.id = `variant-${idx}`;
                    div.innerHTML = `<input type="text" placeholder="Nama varian" class="variant-name" value="${v.name.replace(/"/g, '&quot;')}"><input type="number" placeholder="Harga" class="variant-price-input" value="${v.price}"><button class="btn-danger" onclick="removeVariantField('variant-${idx}')"><i class="fas fa-times"></i> Hapus</button>`;
                    container.appendChild(div);
                });
            }
            deleteProduct(id);
            showToast("Edit produk, lalu simpan ulang.");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function deleteProduct(id) {
        if (confirm("Yakin hapus produk ini?")) {
            products = products.filter(p => p.id !== id);
            // Hapus juga dari keranjang semua user
            for (let user in carts) {
                for (let key in carts[user]) {
                    if (key.startsWith(id.toString())) {
                        delete carts[user][key];
                    }
                }
            }
            saveAll();
            showToast("Produk dihapus!");
            renderManageProducts();
            renderProducts();
            renderHome();
            renderCart();
        }
    }

            `;

        }

                <div class="logo" onclick="showPage('home')"><div class="logo-text">DYNAN MARKET</div><div class="logo-sub">PREMIUM SOLUTIONS</div></div>

            <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
            <div class="container">
                <!-- HOME PAGE -->
                <div id="page-home" class="page active">
                    <div class="hero glass">

                    </div>
                    <div class="glass" style="padding: 1.2rem; margin-bottom: 1.5rem;"><div id="statsContainer"></div></div>
                    <div class="glass" style="padding: 1.2rem; margin-bottom: 1.5rem; text-align: center;"><h3>⭐ Rating: <span id="avgRating">0</span>/5</h3><div id="recentComments"></div></div>

                </div>

            renderHome(); renderProducts(); renderCart(); renderOrders(); renderReviews(); renderAccount();

    // ==================== EXPOSE GLOBAL FUNCTIONS ====================
