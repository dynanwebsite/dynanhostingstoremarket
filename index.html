<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DYNAN HOSTING STORE | Premium Hosting Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #F4E883;
            --accent-dark: #D4A017;
            --accent-glow: rgba(244, 232, 131, 0.25);
            --gold-gradient: linear-gradient(135deg, #F4E883, #D4A017);
        }

        body.dark {
            --bg-primary: #0A0A08;
            --bg-secondary: #141412;
            --bg-card: rgba(20, 20, 18, 0.95);
            --text-primary: #FFFFFF;
            --text-secondary: #B8B8A8;
            --border: rgba(244, 232, 131, 0.15);
            --glass-bg: rgba(20, 20, 18, 0.85);
            --glass-border: rgba(244, 232, 131, 0.2);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --input-bg: #222218;
            --toast-bg: #1A1A14;
            --card-hover: rgba(244, 232, 131, 0.03);
        }

        body.light {
            --bg-primary: #F8F8F5;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255,255,255,0.95);
            --text-primary: #0D0D09;
            --text-secondary: #5A5A4A;
            --border: rgba(212, 160, 23, 0.15);
            --glass-bg: rgba(255,255,255,0.9);
            --glass-border: rgba(212, 160, 23, 0.25);
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --input-bg: #FFFFFF;
            --toast-bg: #FFFFFF;
            --card-hover: rgba(212, 160, 23, 0.03);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        h1, h2, h3, .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }

        .btn-gold {
            background: var(--gold-gradient);
            border: none;
            color: #0D0D09;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--accent);
            color: var(--accent);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            background: var(--accent);
            color: #0D0D09;
        }

        .btn-danger {
            background: rgba(220, 53, 69, 0.85);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            cursor: pointer;
        }
        .logo-text {
            font-size: 1.8rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .logo-sub {
            font-size: 0.65rem;
            color: var(--accent);
            letter-spacing: 3px;
            margin-top: 4px;
        }

        .nav-links {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .nav-links button, .nav-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.6rem 1.2rem;
            transition: all 0.3s;
            border-radius: 40px;
            font-weight: 500;
            font-family: 'Montserrat', sans-serif;
        }

        .nav-links button:hover, .nav-links button.active {
            background: var(--accent);
            color: #0D0D09;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5%;
            min-height: calc(100vh - 150px);
        }

        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .login-card {
            max-width: 450px;
            width: 90%;
            padding: 2.5rem;
            text-align: center;
        }

        .hero {
            text-align: center;
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }
        .product-card {
            padding: 1.3rem;
        }
        .product-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .product-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent);
            margin: 0.5rem 0;
        }
        .stock-badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--border);
            display: inline-block;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
            color: var(--accent);
            font-size: 0.85rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .checkbox-group input {
            width: auto;
            margin: 0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--toast-bg);
            border-left: 4px solid var(--accent);
            padding: 1rem 1.8rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            z-index: 2000;
            animation: slideIn 0.3s ease;
            font-weight: 500;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--glass-bg);
            border-radius: 24px;
            border: 1px dashed var(--accent);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-card {
            text-align: center;
            padding: 1rem;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .nav-links { justify-content: center; }
            .container { padding: 1rem; }
            .hero h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="dark" id="appBody">
    <div id="app"></div>

<script>
    // ==================== KONFIGURASI ====================
    const OWNER_USERNAME = "dynan";
    const OWNER_PASSWORD = "257368419";
    const WHATSAPP_NUMBER = "6283180072584";
    const MAPS_LINK = "https://maps.app.goo.gl/fr1AMLqnS6DnV1m69";
    const QRIS_LINK = "https://freeimage.host/i/C9S8XI9";

    // ==================== DATA STORAGE (FILE JSON SIMULASI) ====================
    let products = JSON.parse(localStorage.getItem("products_json")) || [];
    let users = JSON.parse(localStorage.getItem("users_json")) || [{ username: OWNER_USERNAME, password: OWNER_PASSWORD, role: "owner", email: "owner@dynan.com", createdAt: new Date().toISOString() }];
    let carts = JSON.parse(localStorage.getItem("carts_json")) || {};
    let orders = JSON.parse(localStorage.getItem("orders_json")) || [];
    let ratings = JSON.parse(localStorage.getItem("ratings_json")) || [];
    let comments = JSON.parse(localStorage.getItem("comments_json")) || [];
    let totalVisits = parseInt(localStorage.getItem("totalVisits_json")) || 0;
    let websiteStatus = JSON.parse(localStorage.getItem("websiteStatus_json")) || { status: "online" };

    totalVisits++;
    localStorage.setItem("totalVisits_json", totalVisits);

    let currentUser = null;

    function saveAllData() {
        localStorage.setItem("products_json", JSON.stringify(products));
        localStorage.setItem("users_json", JSON.stringify(users));
        localStorage.setItem("carts_json", JSON.stringify(carts));
        localStorage.setItem("orders_json", JSON.stringify(orders));
        localStorage.setItem("ratings_json", JSON.stringify(ratings));
        localStorage.setItem("comments_json", JSON.stringify(comments));
        localStorage.setItem("websiteStatus_json", JSON.stringify(websiteStatus));
    }

    function showToast(msg, isError = false) {
        let toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        if (isError) toast.style.borderLeftColor = "#dc3545";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Hitung statistik untuk owner & pelanggan lihat
    function getStats() {
        let totalSold = 0;
        let totalRevenue = 0;
        orders.forEach(order => {
            if (order.status === "Selesai") {
                totalSold += order.items.length;
                totalRevenue += order.total;
            }
        });
        return { totalSold, totalRevenue, totalOrders: orders.length, totalProducts: products.length, totalCustomers: users.filter(u => u.role === "customer").length, totalVisits, totalRatings: ratings.length };
    }

    // ==================== RENDER APP ====================
    function renderApp() {
        const app = document.getElementById("app");
        if (!currentUser) {
            app.innerHTML = `
                <div class="login-page">
                    <div class="login-card glass">
                        <div style="margin-bottom: 1.5rem;">
                            <div class="logo-text" style="font-size: 2.2rem;">DYNAN</div>
                            <div class="logo-sub">HOSTING STORE</div>
                            <div style="width: 60px; height: 2px; background: var(--accent); margin: 1rem auto;"></div>
                        </div>
                        <h3 style="margin-bottom: 1.5rem;">Welcome Back</h3>
                        <div class="form-group">
                            <input type="text" id="loginUser" placeholder="Username" style="text-align: center;">
                        </div>
                        <div class="form-group">
                            <input type="password" id="loginPass" placeholder="Password" style="text-align: center;">
                        </div>
                        <button class="btn-gold" onclick="login()" style="width: 100%; justify-content: center;"><i class="fas fa-key"></i> Login</button>
                        <hr style="margin: 1.5rem 0; border-color: var(--border);">
                        <h4>New Customer?</h4>
                        <div class="form-group" style="margin-top: 1rem;">
                            <input type="text" id="regUser" placeholder="Username">
                        </div>
                        <div class="form-group">
                            <input type="password" id="regPass" placeholder="Password">
                        </div>
                        <div class="form-group">
                            <input type="email" id="regEmail" placeholder="Email (optional)">
                        </div>
                        <button class="btn-outline" onclick="register()" style="width: 100%;"><i class="fas fa-user-plus"></i> Daftar Sekarang</button>
                    </div>
                </div>
            `;
            return;
        }

        const stats = getStats();
        const isOwner = currentUser.role === "owner";

        app.innerHTML = `
            <div class="navbar">
                <div class="logo" onclick="showPage('home')">
                    <div class="logo-text">DYNAN HOSTING STORE</div>
                    <div class="logo-sub">PREMIUM HOSTING SOLUTIONS</div>
                </div>
                <div class="nav-links" id="navLinks">
                    <button class="nav-btn" onclick="showPage('home')">🏠 Beranda</button>
                    <button class="nav-btn" onclick="showPage('products')">📦 Produk</button>
                    <button class="nav-btn" onclick="showPage('cart')">🛒 Keranjang</button>
                    <button class="nav-btn" onclick="showPage('orders')">📋 Pesanan Saya</button>
                    <button class="nav-btn" onclick="showPage('reviews')">⭐ Ulasan</button>
                    <button class="nav-btn" onclick="showPage('account')">👤 Akun</button>
                    <button class="nav-btn" onclick="showPage('payment')">💳 QRIS</button>
                    <button class="nav-btn" onclick="showPage('contact')">📞 Kontak</button>
                    ${isOwner ? `<button class="nav-btn" onclick="showPage('manage-products')">🔧 Kelola Produk</button>` : ''}
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
                </div>
            </div>
            <div class="container">
                <div id="page-home" class="page active">
                    <div class="hero glass">
                        <h2>✨ Selamat Datang, ${currentUser.username}!</h2>
                        <p>Exclusive Hosting Solutions for Elite Business</p>
                        <button class="btn-gold" onclick="window.open('${MAPS_LINK}', '_blank')"><i class="fas fa-map-marker-alt"></i> Lokasi Toko</button>
                    </div>
                    <div class="glass" style="padding: 1.5rem; margin-bottom: 2rem;">
                        <h3 style="text-align: center;">📊 Statistik Website</h3>
                        <div class="stats-grid">
                            <div class="stat-card glass"><div class="stat-number">${stats.totalVisits}</div><div>Total Kunjungan</div></div>
                            <div class="stat-card glass"><div class="stat-number">${stats.totalProducts}</div><div>Total Produk</div></div>
                            <div class="stat-card glass"><div class="stat-number">${stats.totalSold}</div><div>Produk Terjual</div></div>
                            <div class="stat-card glass"><div class="stat-number">Rp ${stats.totalRevenue.toLocaleString()}</div><div>Total Pendapatan</div></div>
                            <div class="stat-card glass"><div class="stat-number">${stats.totalCustomers}</div><div>Pelanggan</div></div>
                            <div class="stat-card glass"><div class="stat-number">${ratings.length > 0 ? (ratings.reduce((a,b)=>a+b.stars,0)/ratings.length).toFixed(1) : 0}</div><div>Rating Rata-rata</div></div>
                        </div>
                    </div>
                    <div class="glass" style="padding: 1.5rem; margin-bottom: 2rem; text-align: center;">
                        <h3>⭐ Rating Website: <span id="avgRatingDisplay">${ratings.length > 0 ? (ratings.reduce((a,b)=>a+b.stars,0)/ratings.length).toFixed(1) : 0}</span> / 5.0</h3>
                        <div id="recentComments"></div>
                    </div>
                    <div>
                        <h3>🔥 Produk Unggulan</h3>
                        <div id="featuredProducts" class="products-grid"></div>
                    </div>
                </div>
                <div id="page-products" class="page"><h2>📦 Semua Produk</h2><div id="allProductsList" class="products-grid"></div></div>
                <div id="page-cart" class="page"><h2>🛒 Keranjang Belanja</h2><div id="cartItems" class="glass" style="padding: 1rem;"></div><div id="checkoutBtn" style="margin-top: 1.5rem; text-align: right;"></div></div>
                <div id="page-orders" class="page"><h2>📋 Riwayat Pesanan</h2><div id="ordersList"></div></div>
                <div id="page-reviews" class="page">
                    <h2>⭐ Rating & Komentar</h2>
                    ${currentUser.role === "customer" ? `
                    <div class="glass" style="padding: 1.5rem; margin-bottom: 2rem;">
                        <h3>Berikan Ulasan</h3>
                        <div class="form-group"><label>Rating Bintang</label><select id="ratingStars"><option value="5">⭐⭐⭐⭐⭐ (5)</option><option value="4">⭐⭐⭐⭐ (4)</option><option value="3">⭐⭐⭐ (3)</option><option value="2">⭐⭐ (2)</option><option value="1">⭐ (1)</option></select></div>
                        <div class="form-group"><label>Komentar</label><textarea id="commentText" rows="3" placeholder="Tulis komentar Anda..."></textarea></div>
                        <button class="btn-gold" onclick="submitReview()"><i class="fas fa-paper-plane"></i> Kirim Ulasan</button>
                    </div>
                    ` : `<div class="glass" style="padding: 1.5rem; margin-bottom: 2rem; text-align: center;"><p><i class="fas fa-star"></i> Login sebagai pelanggan untuk memberi ulasan</p></div>`}
                    <div id="allReviews"></div>
                </div>
                <div id="page-account" class="page">
                    <h2>👤 Akun Saya</h2>
                    <div class="glass" style="padding: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                            <div><i class="fas fa-user-circle" style="font-size: 3rem; color: var(--accent);"></i></div>
                            <div><h3>${currentUser.username}</h3><p>${currentUser.email || "Email tidak diisi"}<br><span class="stock-badge">${currentUser.role === "owner" ? "👑 OWNER" : "👤 Pelanggan"}</span></p></div>
                            <button class="btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                        </div>
                        <hr style="margin: 1rem 0;">
                        <h4>Edit Profil</h4>
                        <div class="form-group"><input type="text" id="editUsername" placeholder="Username Baru"></div>
                        <div class="form-group"><input type="password" id="editPassword" placeholder="Password Baru"></div>
                        <div class="form-group"><input type="email" id="editEmail" placeholder="Email Baru"></div>
                        <button class="btn-gold" onclick="editProfile()"><i class="fas fa-save"></i> Simpan Perubahan</button>
                    </div>
                    ${isOwner ? `
                    <div class="glass" style="padding: 1.5rem; margin-top: 2rem;">
                        <h3><i class="fas fa-crown"></i> Panel Owner</h3>
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem;">
                            <button class="btn-gold" onclick="showPage('manage-products')"><i class="fas fa-boxes"></i> Kelola Produk</button>
                            <button class="btn-gold" onclick="showPage('orders')"><i class="fas fa-clipboard-list"></i> Semua Pesanan</button>
                            <button class="btn-outline" onclick="toggleWebsiteStatus()"><i class="fas fa-globe"></i> ${websiteStatus.status === "online" ? "Set Offline" : "Set Online"}</button>
                        </div>
                    </div>
                    ` : ''}
                </div>
                <div id="page-manage-products" class="page">
                    <h2>🔧 Kelola Produk <span style="font-size: 0.7rem;">(Owner Only)</span></h2>
                    <div class="glass" style="padding: 1.5rem; margin-bottom: 2rem;">
                        <h3><i class="fas fa-plus-circle"></i> Tambah Produk Baru</h3>
                        <div class="form-group"><label>Nama Produk</label><input type="text" id="prodName" placeholder="Contoh: Hosting Premium 10GB"></div>
                        <div class="form-group"><label>Jenis Produk</label><input type="text" id="prodType" placeholder="Contoh: Hosting, Domain, SSL, Server, dll"></div>
                        <div class="form-group"><label>Harga (Rp)</label><input type="number" id="prodPrice" placeholder="Contoh: 149000"></div>
                        <div class="form-group"><label>Benefits / Keuntungan</label><textarea id="prodBenefits" rows="3" placeholder="Contoh: ✅ SSD Cepat, ✅ Support 24/7, ✅ Free Domain"></textarea></div>
                        <div class="form-group">
                            <label>Stok Produk</label>
                            <div class="checkbox-group"><input type="checkbox" id="prodUnlimited" onchange="toggleStockInput()"> <label style="margin:0;">Unlimited (Stok tidak terbatas)</label></div>
                            <div id="stockInputDiv" style="margin-top: 10px;"><input type="number" id="prodStock" placeholder="Jumlah stok tersedia"></div>
                        </div>
                        <button class="btn-gold" onclick="addProduct()"><i class="fas fa-save"></i> Simpan Produk</button>
                    </div>
                    <h3>📋 Daftar Produk</h3>
                    <div id="manageProductsList"></div>
                </div>
                <div id="page-payment" class="page">
                    <h2>💳 Pembayaran QRIS</h2>
                    <div class="glass" style="text-align: center; padding: 2.5rem;">
                        <img src="${QRIS_LINK}" alt="QRIS Code" style="max-width: 280px; border-radius: 24px; box-shadow: var(--shadow);">
                        <p style="margin-top: 1.5rem;"><i class="fas fa-qrcode"></i> Scan QRIS di atas untuk melakukan pembayaran</p>
                        <p style="font-size: 0.8rem; color: var(--text-secondary);">Setelah pembayaran, konfirmasi melalui WhatsApp dengan menyertakan bukti transfer</p>
                    </div>
                </div>
                <div id="page-contact" class="page">
                    <h2>📞 Hubungi Kami</h2>
                    <div class="glass" style="padding: 2rem; text-align: center;">
                        <div style="display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center;">
                            <button class="btn-gold" onclick="window.open('https://wa.me/${WHATSAPP_NUMBER}', '_blank')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                            <button class="btn-gold" onclick="window.open('https://instagram.com/nannhtgl', '_blank')"><i class="fab fa-instagram"></i> Instagram</button>
                            <button class="btn-gold" onclick="window.open('https://t.me/dynaniniwe', '_blank')"><i class="fab fa-telegram"></i> Telegram</button>
                        </div>
                        <hr style="margin: 1.5rem 0; border-color: var(--border);">
                        <button class="btn-outline" onclick="window.open('${MAPS_LINK}', '_blank')"><i class="fas fa-map-marker-alt"></i> Lihat di Google Maps</button>
                    </div>
                </div>
            </div>
            <footer>
                <p>© 2025 DYNAN HOSTING STORE | <i class="fas fa-chart-line"></i> Total Kunjungan: ${totalVisits}</p>
            </footer>
        `;
        
        // Render konten setelah app di-render
        setTimeout(() => {
            renderHomeContent();
            renderProductsContent();
            renderCartContent();
            renderOrdersContent();
            renderReviewsContent();
            if (isOwner) renderManageProductsContent();
        }, 50);
    }

    function renderHomeContent() {
        let avg = ratings.length ? (ratings.reduce((a,b)=>a+b.stars,0)/ratings.length).toFixed(1) : 0;
        document.getElementById("avgRatingDisplay") && (document.getElementById("avgRatingDisplay").innerText = avg);
        let recent = comments.slice(-3).map(c => `<div style="margin:0.5rem 0; padding:0.5rem; border-left: 3px solid var(--accent);"><b>⭐ ${c.stars}/5</b> - <i>${c.username}</i>: ${c.text}</div>`).join("");
        document.getElementById("recentComments") && (document.getElementById("recentComments").innerHTML = recent || "<p>Belum ada ulasan.</p>");
        let featured = products.slice(0,3);
        let grid = featured.map(p => renderProductCard(p)).join("");
        document.getElementById("featuredProducts") && (document.getElementById("featuredProducts").innerHTML = grid || "<p class='empty-state'>Belum ada produk. Owner silakan tambah produk.</p>");
    }

    function renderProductCard(p) {
        const isCustomer = currentUser && currentUser.role === "customer";
        const stockText = p.unlimited ? "♾️ Unlimited" : `📦 Stok: ${p.stock}`;
        return `
            <div class="card product-card">
                <span class="stock-badge">${p.type || "Produk"}</span>
                <h3>${p.name}</h3>
                <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                <div class="product-benefits" style="font-size:0.8rem; margin:0.5rem 0;">${p.benefits || ""}</div>
                <div class="stock-badge">${stockText}</div>
                ${isCustomer ? `<button class="btn-outline" style="width:100%; margin-top:1rem;" onclick="addToCart(${p.id})"><i class="fas fa-cart-plus"></i> Tambah ke Keranjang</button>` : (currentUser?.role === "owner" ? `<div style="margin-top:1rem;"><button class="btn-outline" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button> <button class="btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Hapus</button></div>` : `<p style="margin-top:1rem; color:var(--text-secondary);"><i class="fas fa-lock"></i> Login sebagai pelanggan untuk membeli</p>`)}
            </div>
        `;
    }

    function renderProductsContent() {
        let grid = products.map(p => renderProductCard(p)).join("");
        document.getElementById("allProductsList") && (document.getElementById("allProductsList").innerHTML = grid || "<div class='empty-state'><i class='fas fa-box-open'></i><p>Belum ada produk.</p></div>");
    }

    function addToCart(productId) {
        if (!currentUser || currentUser.role !== "customer") {
            showToast("Silakan login sebagai pelanggan terlebih dahulu!", true);
            showPage("account");
            return;
        }
        let product = products.find(p => p.id == productId);
        if (product && !product.unlimited && product.stock <= 0) {
            showToast("Maaf, stok produk ini habis!", true);
            return;
        }
        if (!carts[currentUser.username]) carts[currentUser.username] = [];
        carts[currentUser.username].push(productId);
        saveAllData();
        showToast("✅ Produk ditambahkan ke keranjang!");
        renderCartContent();
    }

    function renderCartContent() {
        if (!currentUser || currentUser.role !== "customer") {
            document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Silakan login sebagai pelanggan untuk melihat keranjang.</p></div>`);
            document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = "");
            return;
        }
        let cart = carts[currentUser.username] || [];
        if (cart.length === 0) {
            document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = `<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Keranjang kosong.</p></div>`);
            document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = "");
            return;
        }
        let itemsHtml = "";
        let total = 0;
        cart.forEach(pid => {
            let p = products.find(pr => pr.id == pid);
            if (p) {
                itemsHtml += `<div class="cart-item" style="display:flex; justify-content:space-between; padding:0.8rem; border-bottom:1px solid var(--border);"><span><b>${p.name}</b> - ${p.type}</span><span>Rp ${p.price.toLocaleString()}</span></div>`;
                total += p.price;
            }
        });
        itemsHtml += `<div class="cart-item" style="display:flex; justify-content:space-between; padding:0.8rem; font-weight: bold; border-top:2px solid var(--accent);"><span>Total</span><span>Rp ${total.toLocaleString()}</span></div>`;
        document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = itemsHtml);
        document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = `<button class="btn-gold" onclick="checkout(${total})"><i class="fas fa-credit-card"></i> Checkout & Konfirmasi via WA</button>`);
    }

    function checkout(total) {
        let cart = carts[currentUser.username] || [];
        if (cart.length === 0) return;
        
        let items = cart.map(pid => {
            let p = products.find(pr => pr.id == pid);
            return `${p.name} - Rp ${p.price.toLocaleString()}`;
        }).join("\n");
        
        let orderId = Date.now();
        let orderItems = cart.map(pid => {
            let p = products.find(pr => pr.id == pid);
            return { id: p.id, name: p.name, price: p.price, type: p.type };
        });
        
        let order = {
            id: orderId,
            username: currentUser.username,
            items: orderItems,
            total: total,
            status: "Menunggu Konfirmasi",
            date: new Date().toLocaleString('id-ID'),
            dateISO: new Date().toISOString()
        };
        orders.push(order);
        
        // Kurangi stok jika tidak unlimited
        cart.forEach(pid => {
            let p = products.find(pr => pr.id == pid);
            if (p && !p.unlimited && p.stock > 0) {
                p.stock--;
            }
        });
        
        carts[currentUser.username] = [];
        saveAllData();
        
        let waMsg = `*KONFIRMASI PEMBAYARAN DYNAN HOSTING STORE*\n\nHalo Admin, saya sudah melakukan pembayaran.\n\nDetail Pesanan:\n${items}\n\nTotal: Rp ${total.toLocaleString()}\nTanggal: ${new Date().toLocaleString('id-ID')}\nPelanggan: ${currentUser.username}\n\n*Bukti transfer terlampir.*\n\nMohon segera diproses. Terima kasih.`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waMsg)}`, '_blank');
        
        showToast("Pesanan dibuat! Silakan kirim bukti transfer via WhatsApp.");
        renderCartContent();
        renderOrdersContent();
        renderProductsContent();
        showPage("orders");
    }

    function renderOrdersContent() {
        if (!currentUser) return;
        let userOrders = currentUser.role === "owner" ? orders : orders.filter(o => o.username === currentUser.username);
        if (userOrders.length === 0) {
            document.getElementById("ordersList") && (document.getElementById("ordersList").innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i><p>Belum ada pesanan.</p></div>`);
            return;
        }
        let list = userOrders.map(o => `
            <div class="card" style="margin-bottom:1rem; padding:1.2rem;">
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;">
                    <div><b>Pesanan #${o.id}</b><br><small>${o.date}</small></div>
                    <div><span class="stock-badge" style="background: ${o.status === 'Selesai' ? '#5cb85c' : '#f0ad4e'}">${o.status}</span></div>
                </div>
                <hr style="margin: 0.8rem 0;">
                <div>${o.items.map(i => `📦 ${i.name} - Rp ${i.price.toLocaleString()}`).join('<br>')}</div>
                <div style="margin-top: 0.8rem; font-weight: bold;">Total: Rp ${o.total.toLocaleString()}</div>
                ${currentUser.role === "owner" && o.status === "Menunggu Konfirmasi" ? `<button class="btn-outline" style="margin-top: 0.8rem;" onclick="confirmOrder(${o.id})"><i class="fas fa-check-circle"></i> Konfirmasi Selesai</button>` : ""}
            </div>
        `).join("");
        document.getElementById("ordersList") && (document.getElementById("ordersList").innerHTML = list);
    }

    function confirmOrder(orderId) {
        let order = orders.find(o => o.id == orderId);
        if (order) {
            order.status = "Selesai";
            saveAllData();
            showToast("✅ Pesanan dikonfirmasi selesai!");
            renderOrdersContent();
            renderHomeContent();
        }
    }

    function submitReview() {
        if (!currentUser || currentUser.role !== "customer") {
            showToast("Silakan login sebagai pelanggan untuk memberi ulasan.", true);
            return;
        }
        let stars = parseInt(document.getElementById("ratingStars")?.value || 5);
        let text = document.getElementById("commentText")?.value.trim();
        if (!text) {
            showToast("Tulis komentar terlebih dahulu!", true);
            return;
        }
        ratings.push({ username: currentUser.username, stars: stars, date: new Date().toISOString() });
        comments.push({ username: currentUser.username, stars: stars, text: text, date: new Date().toLocaleString('id-ID') });
        saveAllData();
        showToast("Terima kasih atas ulasannya! ⭐");
        if (document.getElementById("commentText")) document.getElementById("commentText").value = "";
        renderReviewsContent();
        renderHomeContent();
    }

    function renderReviewsContent() {
        if (comments.length === 0) {
            document.getElementById("allReviews") && (document.getElementById("allReviews").innerHTML = `<div class="empty-state"><i class="fas fa-star"></i><p>Belum ada ulasan. Jadi yang pertama!</p></div>`);
            return;
        }
        let all = comments.slice().reverse().map(c => `
            <div class="card" style="margin-bottom:0.8rem; padding:1rem;">
                <div><b>⭐ ${c.stars}/5</b> - <strong>${c.username}</strong> <small style="color: var(--text-secondary);">${c.date}</small></div>
                <p style="margin-top: 0.5rem;">${c.text}</p>
            </div>
        `).join("");
        document.getElementById("allReviews") && (document.getElementById("allReviews").innerHTML = all);
    }

    function login() {
        let user = document.getElementById("loginUser").value.trim();
        let pass = document.getElementById("loginPass").value;
        if (!user || !pass) { showToast("Username dan password harus diisi!", true); return; }
        let found = users.find(u => u.username === user && u.password === pass);
        if (found) {
            currentUser = found;
            saveAllData();
            showToast(`Selamat datang, ${user}! ✨`);
            renderApp();
        } else {
            showToast("❌ Login gagal! Username atau password salah.", true);
        }
    }

    function register() {
        let user = document.getElementById("regUser").value.trim();
        let pass = document.getElementById("regPass").value;
        let email = document.getElementById("regEmail").value;
        if (!user || !pass) { showToast("Username dan password harus diisi!", true); return; }
        if (user === OWNER_USERNAME) { showToast("Username tidak tersedia!", true); return; }
        if (users.find(u => u.username === user)) { showToast("Username sudah terdaftar!", true); return; }
        users.push({ username: user, password: pass, email: email || "", role: "customer", createdAt: new Date().toISOString() });
        saveAllData();
        showToast("✅ Registrasi berhasil! Silakan login.");
        renderApp();
    }

    function logout() {
        currentUser = null;
        renderApp();
        showToast("Anda telah logout.");
    }

    function editProfile() {
        let newU = document.getElementById("editUsername")?.value.trim();
        let newP = document.getElementById("editPassword")?.value;
        let newE = document.getElementById("editEmail")?.value.trim();
        if (newU && newU !== OWNER_USERNAME && !users.find(u => u.username === newU && u.username !== currentUser.username)) {
            let oldUsername = currentUser.username;
            currentUser.username = newU;
            let index = users.findIndex(u => u.username === oldUsername);
            if (index !== -1) users[index] = currentUser;
            if (carts[oldUsername]) { carts[newU] = carts[oldUsername]; delete carts[oldUsername]; }
            orders.forEach(o => { if (o.username === oldUsername) o.username = newU; });
        }
        if (newP) currentUser.password = newP;
        if (newE) currentUser.email = newE;
        let index = users.findIndex(u => u.username === currentUser.username);
        if (index !== -1) users[index] = currentUser;
        saveAllData();
        showToast("✅ Profil berhasil diperbarui!");
        renderApp();
    }

    function addProduct() {
        let name = document.getElementById("prodName")?.value.trim();
        let type = document.getElementById("prodType")?.value.trim();
        let price = parseInt(document.getElementById("prodPrice")?.value);
        let benefits = document.getElementById("prodBenefits")?.value.trim();
        let unlimited = document.getElementById("prodUnlimited")?.checked || false;
        let stock = unlimited ? 999999 : parseInt(document.getElementById("prodStock")?.value) || 0;
        if (!name || !price || price <= 0) { showToast("Nama dan harga produk wajib diisi!", true); return; }
        let id = Date.now();
        products.push({ id, name, type: type || "Produk", price, benefits: benefits || "", unlimited, stock: unlimited ? 999999 : stock });
        saveAllData();
        showToast("✅ Produk berhasil ditambahkan!");
        document.getElementById("prodName").value = "";
        document.getElementById("prodType").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodBenefits").value = "";
        document.getElementById("prodUnlimited").checked = false;
        if (document.getElementById("prodStock")) document.getElementById("prodStock").value = "";
        renderManageProductsContent();
        renderProductsContent();
        renderHomeContent();
    }

    function renderManageProductsContent() {
        if (products.length === 0) {
            document.getElementById("manageProductsList") && (document.getElementById("manageProductsList").innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>⚠️ PRODUK AWAL KOSONG - HANYA OWNER BISA MENAMBAH</p></div>`);
            return;
        }
        let list = products.map(p => `
            <div class="card" style="margin-bottom:0.8rem; padding:1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <div>
                        <span class="stock-badge">${p.type}</span>
                        <h4>${p.name}</h4>
                        <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                        <small>${p.benefits?.substring(0, 80)}${p.benefits?.length > 80 ? '...' : ''}</small>
                        <div>${p.unlimited ? "♾️ Unlimited" : `📦 Stok: ${p.stock}`}</div>
                    </div>
                    <div>
                        <button class="btn-outline" style="margin-right: 0.5rem;" onclick="editProductForm(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Hapus</button>
                    </div>
                </div>
            </div>
        `).join("");
        document.getElementById("manageProductsList") && (document.getElementById("manageProductsList").innerHTML = list);
    }

    function editProductForm(id) {
        let product = products.find(p => p.id === id);
        if (product) {
            document.getElementById("prodName").value = product.name;
            document.getElementById("prodType").value = product.type;
            document.getElementById("prodPrice").value = product.price;
            document.getElementById("prodBenefits").value = product.benefits;
            document.getElementById("prodUnlimited").checked = product.unlimited;
            if (document.getElementById("prodStock")) document.getElementById("prodStock").value = product.unlimited ? "" : product.stock;
            deleteProduct(id);
            showToast("Silakan edit lalu simpan ulang.");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function deleteProduct(id) {
        if (confirm("Yakin ingin menghapus produk ini?")) {
            products = products.filter(p => p.id !== id);
            saveAllData();
            showToast("Produk dihapus!");
            renderManageProductsContent();
            renderProductsContent();
            renderHomeContent();
            renderCartContent();
        }
    }

    function toggleStockInput() {
        let unlimited = document.getElementById("prodUnlimited")?.checked;
        let stockDiv = document.getElementById("stockInputDiv");
        if (stockDiv) stockDiv.style.display = unlimited ? "none" : "block";
    }

    function toggleWebsiteStatus() {
        websiteStatus.status = websiteStatus.status === "online" ? "offline" : "online";
        saveAllData();
        showToast(`🌐 Website sekarang ${websiteStatus.status === "online" ? "ONLINE" : "OFFLINE"}`);
        renderApp();
    }

    function toggleTheme() {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
    }

    function showPage(pageId) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        let targetPage = document.getElementById(`page-${pageId}`);
        if (targetPage) targetPage.classList.add("active");
        if (pageId === "home") renderHomeContent();
        if (pageId === "products") renderProductsContent();
        if (pageId === "cart") renderCartContent();
        if (pageId === "orders") renderOrdersContent();
        if (pageId === "reviews") renderReviewsContent();
        if (pageId === "manage-products") renderManageProductsContent();
    }

    window.toggleStockInput = toggleStockInput;
    window.showPage = showPage;
    window.login = login;
    window.register = register;
    window.logout = logout;
    window.editProfile = editProfile;
    window.addProduct = addProduct;
    window.deleteProduct = deleteProduct;
    window.editProductForm = editProductForm;
    window.addToCart = addToCart;
    window.checkout = checkout;
    window.confirmOrder = confirmOrder;
    window.submitReview = submitReview;
    window.toggleTheme = toggleTheme;
    window.toggleWebsiteStatus = toggleWebsiteStatus;

    renderApp();
</script>
</body>
</html>
