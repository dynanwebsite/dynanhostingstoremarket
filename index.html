<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DYNAN HOSTING STORE | Premium Hosting Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #F4E883;
            --accent-dark: #D4A017;
            --accent-glow: rgba(244, 232, 131, 0.25);
            --gold-gradient: linear-gradient(135deg, #F4E883, #D4A017);
        }

        body.dark {
            --bg-primary: #0A0A08;
            --bg-secondary: #141412;
            --bg-card: rgba(20, 20, 18, 0.96);
            --text-primary: #FFFFFF;
            --text-secondary: #D0D0C0;
            --border: rgba(244, 232, 131, 0.2);
            --glass-bg: rgba(20, 20, 18, 0.92);
            --glass-border: rgba(244, 232, 131, 0.25);
            --shadow: 0 12px 48px rgba(0,0,0,0.5);
            --input-bg: #2A2A20;
            --toast-bg: #1A1A14;
            --sidebar-bg: #0D0D09;
        }

        body.light {
            --bg-primary: #F8F8F5;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255,255,255,0.98);
            --text-primary: #0D0D09;
            --text-secondary: #4A4A3A;
            --border: rgba(212, 160, 23, 0.2);
            --glass-bg: rgba(255,255,255,0.95);
            --glass-border: rgba(212, 160, 23, 0.3);
            --shadow: 0 12px 48px rgba(0,0,0,0.08);
            --input-bg: #FFFFFF;
            --toast-bg: #FFFFFF;
            --sidebar-bg: #F8F8F5;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
            font-size: 18px;
            line-height: 1.5;
        }

        h1, h2, h3, .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        h2 { font-size: 2.5rem; margin-bottom: 1.8rem; letter-spacing: 1px; }
        h3 { font-size: 1.8rem; margin-bottom: 1.2rem; }
        h4 { font-size: 1.3rem; margin-bottom: 0.8rem; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: var(--accent);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .menu-btn:hover { background: var(--accent-glow); transform: scale(1.05); }

        .logo { text-align: center; cursor: pointer; }
        .logo-text { font-size: 2rem; background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
        .logo-sub { font-size: 0.7rem; color: var(--accent); letter-spacing: 5px; margin-top: 5px; }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 52px;
            height: 52px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s;
        }
        .theme-toggle:hover { border-color: var(--accent); transform: rotate(15deg); }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -340px;
            width: 320px;
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            z-index: 1000;
            transition: left 0.3s ease;
            padding: 1.8rem;
            overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h3 { font-size: 1.6rem; margin: 0; }
        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-primary);
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .sidebar-menu button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            padding: 1rem 1.2rem;
            text-align: left;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s;
            font-weight: 500;
        }
        .sidebar-menu button i { width: 32px; font-size: 1.2rem; }
        .sidebar-menu button:hover, .sidebar-menu button.active {
            background: var(--accent);
            color: #0D0D09;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            display: none;
        }
        .overlay.show { display: block; }

        /* Buttons */
        .btn-gold {
            background: var(--gold-gradient);
            border: none;
            color: #0D0D09;
            padding: 16px 36px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        .btn-gold:hover { transform: scale(1.03); box-shadow: 0 0 25px var(--accent-glow); }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-outline:hover { background: var(--accent); color: #0D0D09; transform: scale(1.02); }
        
        .btn-danger {
            background: rgba(220, 53, 69, 0.9);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .btn-danger:hover { background: rgba(220, 53, 69, 1); transform: scale(1.02); }
        
        .btn-small {
            background: var(--accent);
            border: none;
            color: #0D0D09;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            margin: 4px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-small:hover { transform: scale(1.02); }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 5%;
            min-height: calc(100vh - 160px);
        }

        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(25px);} to { opacity: 1; transform: translateY(0);} }

        /* Login */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .login-card {
            max-width: 520px;
            width: 90%;
            padding: 3rem;
            text-align: center;
        }

        /* Password wrapper */
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper input {
            width: 100%;
            padding-right: 55px;
        }
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--accent);
            font-size: 1.2rem;
            background: none;
            border: none;
        }

        /* Hero Section - TATA LETAK DIPERBAIKI */
        .hero {
            text-align: center;
            padding: 2.5rem 2rem;
            margin-bottom: 2.5rem;
            border-radius: 32px;
        }
        .hero h2 {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
        }
        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1.8rem;
        }
        .hero .btn-gold {
            margin-top: 0.5rem;
        }

        /* Products Grid - DIPERBESAR */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2.2rem;
            margin-top: 2rem;
        }
        .product-card { 
            padding: 1.8rem; 
            border-radius: 28px;
            transition: all 0.4s ease;
        }
        .product-card:hover { transform: translateY(-8px); }
        .product-name { font-size: 1.6rem; font-weight: bold; margin-bottom: 0.8rem; }
        .variant-select {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border-radius: 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
        }
        .variant-price { font-size: 1.8rem; font-weight: bold; color: var(--accent); margin: 12px 0; }
        .stock-badge { font-size: 0.75rem; padding: 5px 14px; border-radius: 25px; background: var(--border); display: inline-block; }

        /* Stats Grid - DIPERBESAR */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .stat-card { text-align: center; padding: 1.5rem; border-radius: 24px; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: var(--accent); font-family: 'Cormorant Garamond', serif; }
        .stat-label { font-size: 0.9rem; margin-top: 5px; }

        /* Forms */
        .form-group { margin-bottom: 1.5rem; position: relative; }
        label { font-weight: 600; margin-bottom: 0.7rem; display: block; color: var(--accent); font-size: 0.95rem; }
        input, select, textarea {
            width: 100%;
            padding: 15px 20px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .variant-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }
        .variant-item input { flex: 1; margin: 0; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--toast-bg);
            border-left: 5px solid var(--accent);
            padding: 1.2rem 2.2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            z-index: 2000;
            animation: slideIn 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
            font-size: 0.9rem;
        }
        .empty-state {
            text-align: center;
            padding: 3.5rem;
            background: var(--glass-bg);
            border-radius: 32px;
            border: 1px dashed var(--accent);
        }
        .empty-state i { font-size: 3.5rem; margin-bottom: 1.2rem; }
        .empty-state p { font-size: 1.1rem; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            max-width: 460px;
            width: 90%;
            padding: 2.2rem;
            text-align: center;
            border-radius: 32px;
        }
        .modal-content img { max-width: 240px; margin: 1.2rem auto; border-radius: 24px; }
        .modal-content h3 { font-size: 1.8rem; }

        .cart-item {
            padding: 1.2rem;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
        }

        /* Recent Comments */
        .recent-comment {
            margin: 10px 0;
            padding: 12px;
            border-left: 4px solid var(--accent);
            border-radius: 12px;
            background: var(--glass-bg);
        }

        @media (max-width: 768px) {
            body { font-size: 16px; }
            .container { padding: 1.2rem; }
            .hero h2 { font-size: 1.8rem; }
            .products-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-number { font-size: 1.8rem; }
            .btn-gold, .btn-outline { padding: 12px 24px; }
            .logo-text { font-size: 1.4rem; }
            .product-name { font-size: 1.3rem; }
            .variant-price { font-size: 1.4rem; }
        }
    </style>
</head>
<body class="dark">
    <div id="app"></div>

<script>
    // ==================== KONFIGURASI ====================
    const OWNER_USERNAME = "dynan";
    const OWNER_PASSWORD = "257368419";
    const WHATSAPP_NUMBER = "6283180072584";
    const MAPS_LINK = "https://maps.app.goo.gl/fr1AMLqnS6DnV1m69";
    const QRIS_LINK = "https://freeimage.host/i/C9S8XI9";

    // Data Storage
    let products = JSON.parse(localStorage.getItem("products_json")) || [];
    let users = JSON.parse(localStorage.getItem("users_json")) || [{ username: OWNER_USERNAME, password: OWNER_PASSWORD, role: "owner", email: "owner@dynan.com" }];
    let carts = JSON.parse(localStorage.getItem("carts_json")) || {};
    let orders = JSON.parse(localStorage.getItem("orders_json")) || [];
    let ratings = JSON.parse(localStorage.getItem("ratings_json")) || [];
    let comments = JSON.parse(localStorage.getItem("comments_json")) || [];
    let totalVisits = parseInt(localStorage.getItem("totalVisits_json")) || 0;
    
    // Unique visitor
    if (!localStorage.getItem("visitor_id")) {
        localStorage.setItem("visitor_id", Date.now() + '_' + Math.random().toString(36).substr(2, 6));
        totalVisits++;
        localStorage.setItem("totalVisits_json", totalVisits);
    }

    let currentUser = null;

    function saveAll() {
        localStorage.setItem("products_json", JSON.stringify(products));
        localStorage.setItem("users_json", JSON.stringify(users));
        localStorage.setItem("carts_json", JSON.stringify(carts));
        localStorage.setItem("orders_json", JSON.stringify(orders));
        localStorage.setItem("ratings_json", JSON.stringify(ratings));
        localStorage.setItem("comments_json", JSON.stringify(comments));
    }

    function showToast(msg, isError = false) {
        let toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        if (isError) toast.style.borderLeftColor = "#dc3545";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function togglePassword(inputId, iconId) {
        let input = document.getElementById(inputId);
        let icon = document.getElementById(iconId);
        if (input && icon) {
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    }

    function closeSidebar() {
        document.getElementById("sidebar")?.classList.remove("open");
        document.getElementById("overlay")?.classList.remove("show");
    }

    function openSidebar() {
        document.getElementById("sidebar")?.classList.add("open");
        document.getElementById("overlay")?.classList.add("show");
    }

    function showPage(pageId) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(`page-${pageId}`)?.classList.add("active");
        closeSidebar();
        if (pageId === "home") renderHome();
        if (pageId === "products") renderProducts();
        if (pageId === "cart") renderCart();
        if (pageId === "orders") renderOrders();
        if (pageId === "reviews") renderReviews();
        if (pageId === "account") renderAccount();
        if (pageId === "manage-products") renderManageProducts();
    }

    function renderProductCard(p) {
        const isCustomer = currentUser?.role === "customer";
        const isOwner = currentUser?.role === "owner";
        if (!p.variants || p.variants.length === 0) return "";
        
        let variantsHtml = `<select class="variant-select" id="variant-${p.id}" onchange="updateVariantPrice(${p.id})">`;
        p.variants.forEach((v, idx) => {
            variantsHtml += `<option value="${idx}" data-price="${v.price}">${v.name} - Rp ${v.price.toLocaleString()}</option>`;
        });
        variantsHtml += `</select>`;
        variantsHtml += `<div class="variant-price" id="price-${p.id}">Rp ${p.variants[0].price.toLocaleString()}</div>`;
        
        return `
            <div class="card product-card">
                <div class="product-name">${p.name}</div>
                <div class="stock-badge" style="margin:8px 0;">${p.type || "Produk"}</div>
                <div style="font-size:0.9rem; margin:12px 0; line-height:1.5;">${p.benefits || ""}</div>
                ${variantsHtml}
                ${isCustomer ? `<button class="btn-outline" style="width:100%; margin-top:15px; padding:14px;" onclick="addToCartVariant(${p.id})"><i class="fas fa-cart-plus"></i> Tambah ke Keranjang</button>` : 
                  (isOwner ? `<div style="margin-top:15px; display:flex; gap:10px; justify-content:center;"><button class="btn-small" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button> <button class="btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Hapus</button></div>` : 
                  `<p style="margin-top:15px; font-size:0.85rem; text-align:center;">Login sebagai pelanggan untuk membeli</p>`)}
            </div>
        `;
    }

    function updateVariantPrice(productId) {
        let select = document.getElementById(`variant-${productId}`);
        let priceDiv = document.getElementById(`price-${productId}`);
        if (select && priceDiv) {
            let selectedOption = select.options[select.selectedIndex];
            let price = selectedOption.getAttribute("data-price");
            priceDiv.innerHTML = `Rp ${parseInt(price).toLocaleString()}`;
        }
    }

    function addToCartVariant(productId) {
        if (!currentUser || currentUser.role !== "customer") {
            showToast("Silakan login sebagai pelanggan!", true);
            return;
        }
        let select = document.getElementById(`variant-${productId}`);
        if (!select) return;
        let variantIndex = parseInt(select.value);
        let product = products.find(p => p.id == productId);
        if (!product) return;
        
        let variant = product.variants[variantIndex];
        let cartItem = {
            productId: product.id,
            productName: product.name,
            variantName: variant.name,
            variantPrice: variant.price,
            variantIndex: variantIndex,
            timestamp: Date.now()
        };
        
        if (!carts[currentUser.username]) carts[currentUser.username] = [];
        carts[currentUser.username].push(cartItem);
        saveAll();
        showToast(`✅ ${product.name} - ${variant.name} ditambahkan ke keranjang!`);
        renderCart();
    }

    function renderHome() {
        let avg = ratings.length ? (ratings.reduce((a,b)=>a+b.stars,0)/ratings.length).toFixed(1) : 0;
        let recent = comments.slice(-3).map(c => `<div class="recent-comment"><b>⭐ ${c.stars}/5</b> - <strong>${c.username}</strong>: ${c.text}</div>`).join("");
        document.getElementById("recentComments") && (document.getElementById("recentComments").innerHTML = recent || "<p style='padding:10px;'>Belum ada ulasan. Jadi yang pertama!</p>");
        
        let stats = getStats();
        document.getElementById("statsContainer") && (document.getElementById("statsContainer").innerHTML = `
            <div class="stats-grid">
                <div class="stat-card glass"><div class="stat-number">${stats.totalVisits}</div><div class="stat-label">Total Kunjungan</div></div>
                <div class="stat-card glass"><div class="stat-number">${stats.totalProducts}</div><div class="stat-label">Total Produk</div></div>
                <div class="stat-card glass"><div class="stat-number">${stats.totalSold}</div><div class="stat-label">Produk Terjual</div></div>
                <div class="stat-card glass"><div class="stat-number">Rp ${stats.totalRevenue.toLocaleString()}</div><div class="stat-label">Total Pendapatan</div></div>
                <div class="stat-card glass"><div class="stat-number">${stats.totalCustomers}</div><div class="stat-label">Pelanggan</div></div>
                <div class="stat-card glass"><div class="stat-number">${avg}</div><div class="stat-label">Rating Rata-rata</div></div>
            </div>
        `);
        
        let featured = products.slice(0,3);
        let grid = featured.map(p => renderProductCard(p)).join("");
        document.getElementById("featuredProducts") && (document.getElementById("featuredProducts").innerHTML = grid || "<div class='empty-state'><i class='fas fa-box-open'></i><p>Belum ada produk. Owner silakan tambah produk.</p><button class='btn-gold' style='margin-top:15px;' onclick=\"showPage('manage-products')\">+ Tambah Produk</button></div>");
    }

    function renderProducts() {
        let grid = products.map(p => renderProductCard(p)).join("");
        document.getElementById("allProductsList") && (document.getElementById("allProductsList").innerHTML = grid || "<div class='empty-state'><i class='fas fa-box-open'></i><p>Belum ada produk. Owner silakan tambah produk.</p></div>");
    }

    function renderCart() {
        if (!currentUser || currentUser.role !== "customer") {
            document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Login sebagai pelanggan untuk melihat keranjang</p></div>`);
            document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = "");
            return;
        }
        let cart = carts[currentUser.username] || [];
        if (cart.length === 0) {
            document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = `<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Keranjang belanja kosong</p><button class="btn-gold" style="margin-top:15px;" onclick="showPage('products')">Belanja Sekarang</button></div>`);
            document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = "");

    function editProfile() {
        let newU = document.getElementById("editUsername")?.value.trim();
        let newP = document.getElementById("editPassword")?.value;
        let newE = document.getElementById("editEmail")?.value.trim();
        if (newU && newU !== OWNER_USERNAME && !users.find(u => u.username === newU && u.username !== currentUser.username)) {
            let old = currentUser.username;
            currentUser.username = newU;
            let idx = users.findIndex(u => u.username === old);
            if (idx !== -1) users[idx] = currentUser;
            if (carts[old]) { carts[newU] = carts[old]; delete carts[old]; }
            orders.forEach(o => { if (o.username === old) o.username = newU; });
        }
        if (newP) currentUser.password = newP;
        if (newE) currentUser.email = newE;
        let idx = users.findIndex(u => u.username === currentUser.username);
        if (idx !== -1) users[idx] = currentUser;
        saveAll();
