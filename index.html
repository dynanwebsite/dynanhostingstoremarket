<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DYNAN MARKET | Premium Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #F4E883;
            --accent-dark: #D4A017;
            --accent-glow: rgba(244, 232, 131, 0.25);
            --gold-gradient: linear-gradient(135deg, #F4E883, #D4A017);
        }

        body.dark {
            --bg-primary: #0A0A08;
            --bg-secondary: #141412;
            --bg-card: rgba(20, 20, 18, 0.96);
            --text-primary: #FFFFFF;
            --text-secondary: #D0D0C0;
            --border: rgba(244, 232, 131, 0.2);
            --glass-bg: rgba(20, 20, 18, 0.92);
            --glass-border: rgba(244, 232, 131, 0.25);
            --shadow: 0 12px 48px rgba(0,0,0,0.5);
            --input-bg: #2A2A20;
            --toast-bg: #1A1A14;
            --sidebar-bg: #0D0D09;
        }

        body.light {
            --bg-primary: #F8F8F5;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255,255,255,0.98);
            --text-primary: #0D0D09;
            --text-secondary: #4A4A3A;
            --border: rgba(212, 160, 23, 0.2);
            --glass-bg: rgba(255,255,255,0.95);
            --glass-border: rgba(212, 160, 23, 0.3);
            --shadow: 0 12px 48px rgba(0,0,0,0.08);
            --input-bg: #FFFFFF;
            --toast-bg: #FFFFFF;
            --sidebar-bg: #F8F8F5;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
            font-size: 17px;
            line-height: 1.5;
        }

        h1, h2, h3, .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        h2 { font-size: 2rem; margin-bottom: 1.2rem; }
        h3 { font-size: 1.5rem; margin-bottom: 0.8rem; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* ==================== AUTH PAGES ==================== */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .auth-card {
            max-width: 500px;
            width: 100%;
            padding: 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: var(--shadow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .auth-logo {
            font-size: 2.2rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .auth-subtitle {
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 3px;
        }
        .auth-title {
            font-size: 1.2rem;
            margin-top: 1rem;
            color: var(--text-secondary);
        }
        .auth-divider {
            width: 60px;
            height: 2px;
            background: var(--accent);
            margin: 0.8rem auto 0;
        }

        /* ==================== NAVBAR ==================== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--accent);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover { background: var(--accent-glow); }

        .logo { text-align: center; cursor: pointer; }
        .logo-text { font-size: 1.4rem; background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-sub { font-size: 0.55rem; color: var(--accent); letter-spacing: 3px; }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            z-index: 1000;
            transition: left 0.3s ease;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h3 { font-size: 1.3rem; margin: 0; }
        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-primary);
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .sidebar-menu button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            padding: 0.7rem 1rem;
            text-align: left;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .sidebar-menu button i { width: 28px; }
        .sidebar-menu button:hover, .sidebar-menu button.active {
            background: var(--accent);
            color: #0D0D09;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .overlay.show { display: block; }

        /* ==================== BUTTONS ==================== */
        .btn-gold {
            background: var(--gold-gradient);
            border: none;
            color: #0D0D09;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--accent-glow); }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-outline:hover { background: var(--accent); color: #0D0D09; }
        
        .btn-danger {
            background: rgba(220, 53, 69, 0.9);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .btn-small {
            background: var(--accent);
            border: none;
            color: #0D0D09;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* ==================== CONTAINER & PAGES ==================== */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem 5%;
            min-height: calc(100vh - 130px);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px);} to { opacity: 1; transform: translateY(0);} }

        .hero {
            text-align: center;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            border-radius: 28px;
        }
        .hero h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }

        /* ==================== PRODUCTS ==================== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .product-card { padding: 1.2rem; border-radius: 20px; }
        .product-name { font-size: 1.3rem; font-weight: bold; }
        .variant-select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .variant-price { font-size: 1.4rem; font-weight: bold; color: var(--accent); margin: 8px 0; }
        .stock-badge { font-size: 0.65rem; padding: 3px 10px; border-radius: 20px; background: var(--border); display: inline-block; }

        /* ==================== STATS ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-card { text-align: center; padding: 1rem; border-radius: 20px; }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: var(--accent); }

        /* ==================== FORMS ==================== */
        .form-group { margin-bottom: 1rem; }
        label { font-weight: 600; margin-bottom: 0.4rem; display: block; color: var(--accent); font-size: 0.8rem; }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--accent);
            background: none;
            border: none;
        }

        .variant-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .variant-item input { flex: 1; margin: 0; }

        /* ==================== CART & ORDERS ==================== */
        .cart-item {
            padding: 0.8rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ==================== MODAL ==================== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            max-width: 380px;
            width: 90%;
            padding: 1.5rem;
            text-align: center;
            border-radius: 28px;
        }
        .modal-content img { max-width: 200px; margin: 1rem auto; border-radius: 16px; }

        /* ==================== TOAST & FOOTER ==================== */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--toast-bg);
            border-left: 4px solid var(--accent);
            padding: 0.8rem 1.5rem;
            border-radius: 14px;
            box-shadow: var(--shadow);
            z-index: 1500;
            animation: slideIn 0.3s ease;
            font-size: 0.85rem;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        footer {
            text-align: center;
            padding: 1rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
            font-size: 0.75rem;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            background: var(--glass-bg);
            border-radius: 24px;
            border: 1px dashed var(--accent);
        }

        @media (max-width: 768px) {
            body { font-size: 15px; }
            .container { padding: 1rem; }
            .hero h2 { font-size: 1.4rem; }
            .products-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body class="dark">
    <div id="app"></div>

<script>
    // ==================== KONFIGURASI ====================
    const OWNER_USERNAME = "dynan";
    const OWNER_PASSWORD = "257368419";
    const WHATSAPP_NUMBER = "6283180072584";
    const MAPS_LINK = "https://maps.app.goo.gl/fr1AMLqnS6DnV1m69";
    const QRIS_LINK = "https://freeimage.host/i/C9S8XI9";

    // ==================== DATA STORAGE ====================
    let products = JSON.parse(localStorage.getItem("products_json")) || [];
    let users = JSON.parse(localStorage.getItem("users_json")) || [{ username: OWNER_USERNAME, password: OWNER_PASSWORD, role: "owner", email: "owner@dynan.com", createdAt: new Date().toISOString() }];
    let carts = JSON.parse(localStorage.getItem("carts_json")) || {};
    let orders = JSON.parse(localStorage.getItem("orders_json")) || [];
    let ratings = JSON.parse(localStorage.getItem("ratings_json")) || [];
    let comments = JSON.parse(localStorage.getItem("comments_json")) || [];
    let totalVisits = parseInt(localStorage.getItem("totalVisits_json")) || 0;
    
    // Unique visitor
    if (!localStorage.getItem("visitor_id")) {
        localStorage.setItem("visitor_id", Date.now() + '_' + Math.random().toString(36).substr(2, 6));
        totalVisits++;
        localStorage.setItem("totalVisits_json", totalVisits);
    }

    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    let currentPage = "home";

    // ==================== HELPER FUNCTIONS ====================
    function saveAll() {
        localStorage.setItem("products_json", JSON.stringify(products));
        localStorage.setItem("users_json", JSON.stringify(users));
        localStorage.setItem("carts_json", JSON.stringify(carts));
        localStorage.setItem("orders_json", JSON.stringify(orders));
        localStorage.setItem("ratings_json", JSON.stringify(ratings));
        localStorage.setItem("comments_json", JSON.stringify(comments));
    }

    function showToast(msg, isError = false) {
        let toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        if (isError) toast.style.borderLeftColor = "#dc3545";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function toggleTheme() {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
    }

    function togglePassword(inputId, iconId) {
        let input = document.getElementById(inputId);
        let icon = document.getElementById(iconId);
        if (input && icon) {
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    }

    // ==================== AUTH FUNCTIONS ====================
    function handleLogin() {
        let username = document.getElementById("loginUsername")?.value.trim();
        let password = document.getElementById("loginPassword")?.value;
        
        if (!username || !password) {
            showToast("Username dan password harus diisi!", true);
            return;
        }
        
        let user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = user;
            localStorage.setItem("currentUser", JSON.stringify(user));
            showToast(`✅ Selamat datang, ${username}!`);
            renderApp();
        } else {
            showToast("❌ Login gagal! Username atau password salah.", true);
        }
    }

    function handleRegister() {
        let username = document.getElementById("regUsername")?.value.trim();
        let password = document.getElementById("regPassword")?.value;
        let email = document.getElementById("regEmail")?.value.trim();
        
        if (!username || !password) {
            showToast("Username dan password harus diisi!", true);
            return;
        }
        if (username.length < 3) {
            showToast("Username minimal 3 karakter!", true);
            return;
        }
        if (password.length < 3) {
            showToast("Password minimal 3 karakter!", true);
            return;
        }
        if (username === OWNER_USERNAME) {
            showToast("Username tidak tersedia!", true);
            return;
        }
        if (users.find(u => u.username === username)) {
            showToast("Username sudah terdaftar!", true);
            return;
        }
        
        users.push({
            username: username,
            password: password,
            email: email || "",
            role: "customer",
            createdAt: new Date().toISOString()
        });
        saveAll();
        showToast("✅ Registrasi berhasil! Silakan login.");
        renderApp();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem("currentUser");
        showToast("Anda telah logout.");
        renderApp();
    }

    // ==================== SIDEBAR & NAVIGATION ====================
    function closeSidebar() {
        document.getElementById("sidebar")?.classList.remove("open");
        document.getElementById("overlay")?.classList.remove("show");
    }

    function openSidebar() {
        document.getElementById("sidebar")?.classList.add("open");
        document.getElementById("overlay")?.classList.add("show");
    }

    function showPage(pageId) {
        currentPage = pageId;
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(`page-${pageId}`)?.classList.add("active");
        closeSidebar();
        
        if (pageId === "home") renderHome();
        if (pageId === "products") renderProducts();
        if (pageId === "cart") renderCart();
        if (pageId === "orders") renderOrders();
        if (pageId === "reviews") renderReviews();
        if (pageId === "account") renderAccount();
        if (pageId === "manage-products") renderManageProducts();
    }

    // ==================== PRODUCT CARD ====================
    function renderProductCard(p) {
        const isCustomer = currentUser?.role === "customer";
        const isOwner = currentUser?.role === "owner";
        if (!p.variants || p.variants.length === 0) return "";
        
        let variantsHtml = `<select class="variant-select" id="variant-${p.id}" onchange="updateVariantPrice(${p.id})">`;
        p.variants.forEach((v, idx) => {
            variantsHtml += `<option value="${idx}" data-price="${v.price}">${v.name} - Rp ${v.price.toLocaleString()}</option>`;
        });
        variantsHtml += `</select>`;
        variantsHtml += `<div class="variant-price" id="price-${p.id}">Rp ${p.variants[0].price.toLocaleString()}</div>`;
        
        return `
            <div class="card product-card">
                <div class="product-name">${p.name}</div>
                <div class="stock-badge" style="margin:6px 0;">${p.type || "Produk"}</div>
                <div style="font-size:0.8rem; margin:8px 0;">${p.benefits || ""}</div>
                ${variantsHtml}
                ${isCustomer ? `<button class="btn-outline" style="width:100%; margin-top:10px;" onclick="addToCartVariant(${p.id})"><i class="fas fa-cart-plus"></i> Tambah ke Keranjang</button>` : 
                  (isOwner ? `<div style="margin-top:10px;"><button class="btn-small" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button> <button class="btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Hapus</button></div>` : 
                  `<p style="margin-top:10px; font-size:0.75rem;">Login sebagai pelanggan untuk membeli</p>`)}
            </div>
        `;
    }

    function updateVariantPrice(productId) {
        let select = document.getElementById(`variant-${productId}`);
        let priceDiv = document.getElementById(`price-${productId}`);
        if (select && priceDiv) {
            let opt = select.options[select.selectedIndex];
            let price = opt.getAttribute("data-price");
            priceDiv.innerHTML = `Rp ${parseInt(price).toLocaleString()}`;
        }
    }

    function addToCartVariant(productId) {
        if (!currentUser || currentUser.role !== "customer") {
            showToast("Silakan login sebagai pelanggan!", true);
            return;
        }
        let select = document.getElementById(`variant-${productId}`);
        if (!select) return;
        let variantIndex = parseInt(select.value);
        let product = products.find(p => p.id == productId);
        if (!product) return;
        
        let variant = product.variants[variantIndex];
        let cartItem = {
            productId: product.id,
            productName: product.name,
            variantName: variant.name,
            variantPrice: variant.price,
            variantIndex: variantIndex
        };
        
        if (!carts[currentUser.username]) carts[currentUser.username] = [];
        carts[currentUser.username].push(cartItem);
        saveAll();
        showToast(`✅ ${product.name} - ${variant.name} ditambahkan ke keranjang!`);
        renderCart();
    }

    // ==================== RENDER HOME ====================
    function renderHome() {
        let avg = ratings.length ? (ratings.reduce((a,b)=>a+b.stars,0)/ratings.length).toFixed(1) : 0;
        let recent = comments.slice(-3).map(c => `<div style="margin:6px 0; padding:6px; border-left: 3px solid var(--accent);"><b>⭐ ${c.stars}/5</b> - ${c.username}: ${c.text}</div>`).join("");
        document.getElementById("recentComments") && (document.getElementById("recentComments").innerHTML = recent || "<p>Belum ada ulasan.</p>");
        
        let stats = getStats();
        document.getElementById("statsContainer") && (document.getElementById("statsContainer").innerHTML = `
            <div class="stats-grid">
                <div class="stat-card glass"><div class="stat-number">${stats.totalVisits}</div><div>Kunjungan</div></div>
                <div class="stat-card glass"><div class="stat-number">${stats.totalProducts}</div><div>Produk</div></div>
                <div class="stat-card glass"><div class="stat-number">${stats.totalSold}</div><div>Terjual</div></div>
                <div class="stat-card glass"><div class="stat-number">Rp ${stats.totalRevenue.toLocaleString()}</div><div>Pendapatan</div></div>
                <div class="stat-card glass"><div class="stat-number">${stats.totalCustomers}</div><div>Pelanggan</div></div>
                <div class="stat-card glass"><div class="stat-number">${avg}</div><div>Rating</div></div>
            </div>
        `);
        
        let featured = products.slice(0,3);
        let grid = featured.map(p => renderProductCard(p)).join("");
        document.getElementById("featuredProducts") && (document.getElementById("featuredProducts").innerHTML = grid || "<div class='empty-state'>Belum ada produk. Owner silakan tambah produk.</div>");
    }

    function renderProducts() {
        let grid = products.map(p => renderProductCard(p)).join("");
        document.getElementById("allProductsList") && (document.getElementById("allProductsList").innerHTML = grid || "<div class='empty-state'>Belum ada produk.</div>");
    }

    // ==================== CART ====================
    function renderCart() {
        if (!currentUser || currentUser.role !== "customer") {
            document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = `<div class="empty-state">Login sebagai pelanggan untuk melihat keranjang</div>`);
            document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = "");
            return;
        }
        let cart = carts[currentUser.username] || [];
        if (cart.length === 0) {
            document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = `<div class="empty-state">Keranjang kosong</div>`);
            document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = "");
            return;
        }
        
        let itemsHtml = "";
        let total = 0;
        cart.forEach((item, idx) => {
            total += item.variantPrice;
            itemsHtml += `
                <div class="cart-item">
                    <div><b>${item.productName}</b><br><small>${item.variantName}</small></div>
                    <div>Rp ${item.variantPrice.toLocaleString()} <button class="btn-danger" onclick="removeFromCart(${idx})"><i class="fas fa-trash"></i></button></div>
                </div>
            `;
        });
        itemsHtml += `<div class="cart-item" style="font-weight:bold; border-top:2px solid var(--accent);"><span>Total</span><span>Rp ${total.toLocaleString()}</span></div>`;
        
        document.getElementById("cartItems") && (document.getElementById("cartItems").innerHTML = itemsHtml);
        document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").innerHTML = `<button class="btn-gold" onclick="showPaymentModal(${total})"><i class="fas fa-credit-card"></i> Checkout & Bayar</button>`);
    }

    function removeFromCart(index) {
        if (currentUser && carts[currentUser.username]) {
            carts[currentUser.username].splice(index, 1);
            saveAll();
            renderCart();
        }
    }

    function showPaymentModal(total) {
        let cart = carts[currentUser.username] || [];
        if (cart.length === 0) return;
        let items = cart.map(item => `${item.productName} (${item.variantName}) - Rp ${item.variantPrice.toLocaleString()}`).join("\n");
        let modalHtml = `
            <div class="modal" id="paymentModal">
                <div class="modal-content glass">
                    <h3>💳 QRIS Payment</h3>
                    <img src="${QRIS_LINK}" alt="QRIS">
                    <p><strong>Total: Rp ${total.toLocaleString()}</strong></p>
                    <button class="btn-gold" onclick="confirmPaymentAndWA(${total}, \`${items.replace(/`/g, '\\`')}\`)"><i class="fab fa-whatsapp"></i> Konfirmasi via WA</button>
                    <button class="btn-outline" onclick="closeModal()">Tutup</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML("beforeend", modalHtml);
    }

    function closeModal() { document.getElementById("paymentModal")?.remove(); }

    function confirmPaymentAndWA(total, items) {
        let cart = carts[currentUser.username] || [];
        if (cart.length === 0) return;
        let orderId = Date.now();
        let orderItems = cart.map(item => ({ productName: item.productName, variantName: item.variantName, price: item.variantPrice }));
        orders.push({ id: orderId, username: currentUser.username, items: orderItems, total: total, status: "Menunggu Konfirmasi", date: new Date().toLocaleString('id-ID') });
        carts[currentUser.username] = [];
        saveAll();
        let waMsg = `*KONFIRMASI PEMBAYARAN DYNAN MARKET*\n\nHalo Admin, saya sudah melakukan pembayaran.\n\nDetail Pesanan:\n${items}\n\nTotal: Rp ${total.toLocaleString()}\nTanggal: ${new Date().toLocaleString('id-ID')}\nPelanggan: ${currentUser.username}\n\n*Bukti transfer terlampir.*`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waMsg)}`, '_blank');
        showToast("Pesanan dibuat! Kirim bukti transfer via WA.");
        closeModal();
        renderCart();
        renderOrders();
        showPage("orders");
    }

            document.getElementById("ordersList") && (document.getElementById("ordersList").innerHTML = `<div class="empty-state">Belum ada pesanan.</div>`);

    function confirmOrder(orderId) {

        if (!currentUser || currentUser.role !== "customer") { showToast("Login sebagai pelanggan!", true); return; }
        let stars = parseInt(document.getElementById("ratingStars")?.value || 5);
        let text = document.getElementById("commentText")?.value.trim();

        saveAll();

    function editProfile() {
        let newU = document.getElementById("editUsername")?.value.trim();
        let newP = document.getElementById("editPassword")?.value;
        let newE = document.getElementById("editEmail")?.value.trim();
        if (newU && newU !== OWNER_USERNAME && !users.find(u => u.username === newU && u.username !== currentUser.username)) {
            let old = currentUser.username;
            currentUser.username = newU;
            let idx = users.findIndex(u => u.username === old);
            if (idx !== -1) users[idx] = currentUser;
            if (carts[old]) { carts[newU] = carts[old]; delete carts[old]; }
            orders.forEach(o => { if (o.username === old) o.username = newU; });
        }
        if (newP) currentUser.password = newP;
        if (newE) currentUser.email = newE;
        let idx = users.findIndex(u => u.username === currentUser.username);
        if (idx !== -1) users[idx] = currentUser;
        saveAll();
        localStorage.setItem("currentUser", JSON.stringify(currentUser));

    function addVariantField() {
        let container = document.getElementById("variantsContainer");
        let idx = Date.now();
        let div = document.createElement("div");
        div.className = "variant-item";
        div.id = `variant-${idx}`;
        div.innerHTML = `<input type="text" placeholder="Nama varian (contoh: 2GB RAM)" class="variant-name"><input type="number" placeholder="Harga" class="variant-price-input"><button class="btn-danger" onclick="removeVariantField('variant-${idx}')"><i class="fas fa-times"></i> Hapus</button>`;
        container.appendChild(div);
    }

    function removeVariantField(id) { document.getElementById(id)?.remove(); }

    function getVariantsFromForm() {
        let variants = [];
        document.querySelectorAll(".variant-item").forEach(item => {
            let name = item.querySelector(".variant-name")?.value.trim();
            let price = parseInt(item.querySelector(".variant-price-input")?.value);
            if (name && price > 0) variants.push({ name, price });
        });
        return variants;
    }

    function addProduct() {
        let name = document.getElementById("prodName")?.value.trim();
        let type = document.getElementById("prodType")?.value.trim();
        let benefits = document.getElementById("prodBenefits")?.value.trim();
        let variants = getVariantsFromForm();
        if (!name) { showToast("Nama produk wajib diisi!", true); return; }
        if (variants.length === 0) { showToast("Minimal 1 varian!", true); return; }
        let id = Date.now();
        products.push({ id, name, type: type || "Produk", benefits: benefits || "", variants });
        saveAll();
        showToast("✅ Produk berhasil ditambahkan!");
        document.getElementById("prodName").value = "";
        document.getElementById("prodType").value = "";
        document.getElementById("prodBenefits").value = "";
        document.getElementById("variantsContainer").innerHTML = "";
        renderManageProducts();
        renderProducts();
        renderHome();
    }

    function renderManageProducts() {
        if (products.length === 0) {
            document.getElementById("manageProductsList") && (document.getElementById("manageProductsList").innerHTML = `<div class="empty-state">⚠️ PRODUK KOSONG - TAMBAH PRODUK DENGAN VARIAN</div>`);
            return;
        }
        let list = products.map(p => `
            <div class="card" style="margin-bottom:0.8rem; padding:0.8rem;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <div><h4>${p.name}</h4><div class="stock-badge">${p.type}</div><div style="margin-top:5px;">${p.variants.map(v => `<span class="stock-badge" style="margin-right:5px;">${v.name} - Rp ${v.price.toLocaleString()}</span>`).join('')}</div></div>
                    <div><button class="btn-small" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button> <button class="btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Hapus</button></div>
                </div>
            </div>
        `).join("");
        document.getElementById("manageProductsList") && (document.getElementById("manageProductsList").innerHTML = list);
    }

    function editProduct(id) {
        let product = products.find(p => p.id === id);
        if (product) {
            document.getElementById("prodName").value = product.name;
            document.getElementById("prodType").value = product.type;
            document.getElementById("prodBenefits").value = product.benefits;
            let container = document.getElementById("variantsContainer");
            container.innerHTML = "";
            product.variants.forEach(v => {
                let idx = Date.now();
                let div = document.createElement("div");
                div.className = "variant-item";
                div.id = `variant-${idx}`;
                div.innerHTML = `<input type="text" placeholder="Nama varian" class="variant-name" value="${v.name.replace(/"/g, '&quot;')}"><input type="number" placeholder="Harga" class="variant-price-input" value="${v.price}"><button class="btn-danger" onclick="removeVariantField('variant-${idx}')"><i class="fas fa-times"></i> Hapus</button>`;
                container.appendChild(div);
            });
            deleteProduct(id);
            showToast("Edit produk, lalu simpan ulang.");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function deleteProduct(id) {
        if (confirm("Yakin hapus produk ini?")) {
            products = products.filter(p => p.id !== id);
            saveAll();
            showToast("Produk dihapus!");
            renderManageProducts();

            renderCart();

    }

                    <label>USERNAME</label>
                    <div class="input-wrapper"><input type="text" id="loginUsername" placeholder="Masukkan username Anda"></div>
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="Masukkan password Anda">
                        <button class="toggle-password" onclick="togglePassword('loginPassword', 'loginPassIcon')" type="button"><i class="fas fa-eye" id="loginPassIcon"></i></button>
                    </div>
                </div>
                <button class="btn-gold" onclick="handleLogin()"><i class="fas fa-key"></i> LOGIN SEKARANG</button>
                <div class="auth-footer">
                    <p style="margin-bottom: 6px;">Belum punya akun?</p>
                    <button onclick="showRegisterForm()"><i class="fas fa-user-plus"></i> Buat Akun Baru</button>
                </div>
            `;
        }
    }

    // ==================== EXPOSE GLOBAL FUNCTIONS ====================
    window.toggleTheme = toggleTheme;
    window.togglePassword = togglePassword;
    window.handleLogin = handleLogin;
    window.handleRegister = handleRegister;
    window.showRegisterForm = showRegisterForm;
    window.showLoginForm = showLoginForm;
    window.logout = logout;
    window.closeSidebar = closeSidebar;
    window.openSidebar = openSidebar;
    window.showPage = showPage;
    window.updateVariantPrice = updateVariantPrice;
    window.addToCartVariant = addToCartVariant;
    window.removeFromCart = removeFromCart;
    window.showPaymentModal = showPaymentModal;
    window.closeModal = closeModal;
    window.confirmPaymentAndWA = confirmPaymentAndWA;
    window.confirmOrder = confirmOrder;
    window.submitReview = submitReview;
    window.editProfile = editProfile;
    window.addVariantField = addVariantField;
    window.removeVariantField = removeVariantField;
    window.addProduct = addProduct;
    window.editProduct = editProduct;
    window.deleteProduct = deleteProduct;

    // ==================== INIT ====================
    renderApp();
</script>
</body>
</html>
